CountersUpdater_CARDS_CHECKER:
  Select: {Type: Balance, Root: Slots}
  StringActions: {OnEnter: [{Name: IName, Value: '?getString[SelectKey]'}]}
  BoxContent:
    GoByCards:
      Conditions: 
      - {ConditionType: ValuesEqual, Values: ['?getString[IName]', 'Notes'], Not: '1'}
      - {ConditionType: ValuesEqual, Values: ['?getString[IName]', 'StoryItems'], Not: '1'}
      Select: {Type: ItemGroups, Root: '?getString[IName]'}
      StringActions: {OnEnter: [{Name: CName, Value: '?getString[SelectKey]'}]}
      BoxContent:
        IsLegalPassive:
          Conditions: [{ConditionType: BalanceElementExists, Path: [PassiveSpace], Element: '?getString[CName]'}]
          BoxContent:
            Count:
              Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],Count], 0]', '1']}]
              CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_COUNT, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],Count]'}]}
            Level:
              Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],Level], 0]', '1']}]
              CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_LEVEL, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],Level]'}]}
            IsNew:
              Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],IsNew], 0]', '1']}]
              CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_ISNEW, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],IsNew]'}]}
            IsLevelUp:
              Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],IsLevelUp], 0]', '1']}]
              CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_ISLEVELUP, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],IsLevelUp]'}]}
        IsLegalStunt:
          Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[IName]', 'Stunts']}]
          Select: {Type: Balance, Root: 'Stunts,Groups'}
          BoxContent:
            IsReallyLegalStunt:
              Conditions: [{ConditionType: BalanceElementExists, Path: [Stunts,Groups,'?getString[SelectKey]',Stunts], Element: '?getString[CName]'}]
              NoShuffle: 1
              BoxContent:
                Count:
                  Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],Count], 0]', '1']}]
                  CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_COUNT, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],Count]'}]}
                Level:
                  Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],Level], 0]', '1']}]
                  CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_LEVEL, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],Level]'}]}
                IsNew:
                  Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],IsNew], 0]', '1']}]
                  CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_ISNEW, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],IsNew]'}]}
                IsLevelUp:
                  Conditions: [{ConditionType: ValuesEqual, Values: ['?greater[?getItemAttribute[?getString[IName],?getString[CName],IsLevelUp], 0]', '1']}]
                  CounterActions: {OnEnter: [{Name: '?getString[CName]', Namespace: UPD_CARDS_ISLEVELUP, Type: Assign, Value: '?getItemAttribute[?getString[IName],?getString[CName],IsLevelUp]'}]}
                Break: {BreakSelect: 1}
              
CountersUpdater_CARDS_CLEANER:
  Select: {Type: Balance, Root: Slots}
  StringActions: {OnEnter: [{Name: IName, Value: '?getString[SelectKey]'}]}
  BoxContent:
    DeleteSomeShit:
      Conditions: 
      - {ConditionType: ValuesEqual, Values: ['?getString[IName]', 'Notes'], Not: '1'}
      - {ConditionType: ValuesEqual, Values: ['?getString[IName]', 'StoryItems'], Not: '1'}
      ItemActions: {OnEnter: [{Name: '?getString[IName]', Type: "Remove"}]}
      
ItemsUpdater_CARDS_RECREATOR_STUNTS:
  Target: {Type: NewItem, Destination: Stash}
  GroupContent: {ST_ItemMainData: {ST_ItemName: "Stunts", ST_VisualItemName: "^Gadgets.SlotsVisualNames.Stunts^"}}
  BoxContent:
    GoByGroups:
      Select: {Type: Balance, Root: 'Stunts,Groups'}
      StringActions: {OnEnter: [{Name: GName, Value: '?getString[SelectKey]'}]}
      BoxContent:
        GoByStunt:
          Select: {Type: Balance, Root: 'Stunts,Groups,?getString[GName],Stunts'}
          StringActions: {OnEnter: [{Name: SName, Value: '?getString[SelectKey]'}]}
          BoxContent:
            StuntExists:
              Conditions: [{ConditionType: CounterRange, Name: '?getString[SName]', Namespace: UPD_CARDS_COUNT, Min: 1}]
              GroupContent: 
                '?getString[SName]': 
                  Count: '<UPD_CARDS_COUNT.?getString[SName]>'
                  Level: '<UPD_CARDS_LEVEL.?getString[SName]>'
                  IsNew: '<UPD_CARDS_ISNEW.?getString[SName]>'
                  IsLevelUp: '<UPD_CARDS_ISLEVELUP.?getString[SName]>'
              
