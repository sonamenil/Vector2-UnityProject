UserVersion: 15
ItemsUpdater_GADGETS_DESCRIPTION:
  Target: "?getString[Upd_ItemName]"
  NoShuffle: 1
  BoxContent:
    THIS_IS_GADGET:
      Conditions: [{ConditionType: GroupExists, Item: "?getString[Upd_ItemName]", Group: "ST_MyGadgets"}]
      GroupContent: 
        ST_VisualData: 
          ST_Description: "?concat['^Labels.Details.%1Description^', ?_getItemAttribute[?getString[Upd_ItemName],ST_MyGadgets,ST_Slot]]"

CountersUpdater_STARTERPACKS_CLEANER:
  Select: {Type: Items, Root: All}
  BoxContent:
    STARTERPACK:
      Conditions: [{ConditionType: GroupExists, Item: '?getString[SelectKey]', Group: StartFloor}]
      ItemActions: {OnExit: [{Name: '?getString[SelectKey]', Type: Remove}]}
      Set: 1
      NoShuffle: 1
      BoxContent:
        BLOCKED:
          Conditions: [{ConditionType: GroupExists, Item: '?getString[SelectKey]', Group: BlockedStarterPack}]
          StringActions: {OnEnter: [{Name: '?getString[SelectKey]', Value: '?getItemAttribute[?getString[SelectKey],BlockedStarterPack,Text]'}]}
          CounterActions: {OnEnter: [{Name: '?getString[SelectKey]', Namespace: UPD_STRTRPCK, Type: Assign, Value: 2}]}
        NOT:
          CounterActions: {OnEnter: [{Name: '?getString[SelectKey]', Namespace: UPD_STRTRPCK, Type: Assign, Value: 1}]}

NewItems_STARTERPACKS_CLEANER:
  BasicProtocolOpened:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: BasicProtocol, Namespace: UPD_STRTRPCK, Equal: 1}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "BasicProtocol", ST_VisualItemName: "^StarterPacks.BasicProtocol.PackName^", ST_ItemType: "StarterPack"}
  StandardProtocolOpened:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: StandardProtocol, Namespace: UPD_STRTRPCK, Equal: 1}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "StandardProtocol", ST_VisualItemName: "^StarterPacks.StandardProtocol.PackName^", ST_ItemType: "StarterPack"}
  AdvancedProtocolOpened:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: AdvancedProtocol, Namespace: UPD_STRTRPCK, Equal: 1}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "AdvancedProtocol", ST_VisualItemName: "^StarterPacks.AdvancedProtocol.PackName^", ST_ItemType: "StarterPack"}
  ExperimentalProtocolOpened:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: ExperimentalProtocol, Namespace: UPD_STRTRPCK, Equal: 1}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "ExperimentalProtocol", ST_VisualItemName: "^StarterPacks.ExperimentalProtocol.PackName^", ST_ItemType: "StarterPack"}
  StandardProtocolBLOCKED:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: StandardProtocol, Namespace: UPD_STRTRPCK, Equal: 2}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "StandardProtocol", ST_VisualItemName: "^StarterPacks.StandardProtocol.PackName^", ST_ItemType: "StarterPack"}
      BlockedStarterPack: {Text: "^Quests.EnduranceTest.BlockedStarterPack^"}
  AdvancedProtocolBLOCKED:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: AdvancedProtocol, Namespace: UPD_STRTRPCK, Equal: 2}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "AdvancedProtocol", ST_VisualItemName: "^StarterPacks.AdvancedProtocol.PackName^", ST_ItemType: "StarterPack"}
      BlockedStarterPack: {Text: "^Quests.TheContact.BlockedStarterPack^"}
  ExperimentalProtocolBLOCKED:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: ExperimentalProtocol, Namespace: UPD_STRTRPCK, Equal: 2}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "ExperimentalProtocol", ST_VisualItemName: "^StarterPacks.ExperimentalProtocol.PackName^", ST_ItemType: "StarterPack"}
      BlockedStarterPack: {Text: "^Quests.Bruteforce.BlockedStarterPack^"}
  AlphaProtocolBLOCKED:
    Target: {Type: NewItem, Destination: Stash}
    Conditions: [{ConditionType: CounterRange, Name: ServiceEntrance, Namespace: ST_Quests, Equal: 1}]
    GroupContent:
      ST_ItemMainData: {ST_ItemName: "AlphaProtocol", ST_VisualItemName: "^StarterPacks.AlphaProtocol.PackName^", ST_ItemType: "StarterPack"}
      BlockedStarterPack: {Text: ""}

