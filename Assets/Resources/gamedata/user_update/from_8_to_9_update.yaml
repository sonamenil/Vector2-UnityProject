UserVersion: 9
ReplaceRegularExpression:
  NoShuffle: 1
  BoxContent:
    RegularExpression1:
      Regular: '(Group Name="[a-zA-Z]+_)(\d)"'
      Replace: '$1$2" Rarity="$2"'
    RegularExpression2:
      Regular: 'Name="GenerateGadget"'
      Replace: 'Name="Reroll"'
    RegularExpression3:
      Regular: 'Name="StarterPackRecharge"'
      Replace: 'Name="EnergyRecharge"'
    RegularExpression4:
      Regular: '<Group Name="Universal".*?>'
      Replace: ''
    RegularExpression5:
      Regular: '<Group Name="BlockedStarterPack" Text="\^Quests.PlannedUpgrade.BlockedStarterPack\^" />'
      Replace: '<Group Name="BlockedStarterPack" Text="^Quests.TheContact.BlockedStarterPack^" />'
    RegularExpression6:
      Regular: '<Group Name="WhiteModel".*?>'
      Replace: ''
    RegularExpression7:
      Regular: '<Group Name="BlackModel".*?>'
      Replace: ''
      
CountersUpdater_QUESTS:
  NoShuffle: 1
  BoxContent:
    ToTemp:
      CounterActions:
        OnEnter:
        - {Name: InspectGear, Namespace: TempQuests, Type: Assign, Value: -1}
        - {Name: InsertUpgrade, Namespace: TempQuests, Type: Assign, Value: -1}
        - {Name: UpgradeEffect, Namespace: TempQuests, Type: Assign, Value: -1}
        - {Name: StandardProtocolQuest, Namespace: TempQuests, Type: Assign, Value: -1}
        - {Name: KeysIntro, Namespace: TempQuests, Type: Assign, Value: -1}
        - {Name: ThirdProtocol, Namespace: TempQuests, Type: Assign, Value: "<ST_Quests.ThirdProtocol>"}
        - {Name: Bruteforce, Namespace: TempQuests, Type: Assign, Value: "<ST_Quests.Bruteforce>"}
        - {Name: SecureConnection, Namespace: TempQuests, Type: Assign, Value: "<ST_Quests.SecureConnection>"}
        - {Name: TreasureHunt, Namespace: TempQuests, Type: Assign, Value: "<ST_Quests.TreasureHunt>"}
        - {Name: ServiceEntrance, Namespace: TempQuests, Type: Assign, Value: "<ST_Quests.ServiceEntrance>"}
        - {Name: RaresCollector, Namespace: TempQuests, Type: Assign, Value: "<ST_Quests.RaresCollector>"}
    Clear:
      CounterActions:
        OnEnter:
        - {Namespace: ST_Quests, Type: Clear}
        - {Namespace: ST_NewQuest, Type: Clear}
        - {Namespace: InspectGear, Type: Clear}
        - {Namespace: InsertUpgrade, Type: Clear}
        - {Namespace: UpgradeEffect, Type: Clear}
        - {Namespace: StandardProtocolQuest, Type: Clear}
        - {Namespace: KeysIntro, Type: Clear}
        - {Namespace: ThirdProtocol, Type: Clear}
        - {Namespace: Bruteforce, Type: Clear}
        - {Namespace: SecureConnection, Type: Clear}
    FromTemp:
      CounterActions:
        OnEnter:
        - {Name: InspectGear, Namespace: ST_Quests, Type: Assign, Value: -1}
        - {Name: InsertUpgrade, Namespace: ST_Quests, Type: Assign, Value: -1}
        - {Name: UpgradeEffect, Namespace: ST_Quests, Type: Assign, Value: -1}
        - {Name: StandardProtocolQuest, Namespace: ST_Quests, Type: Assign, Value: -1}
        - {Name: KeysIntro, Namespace: ST_Quests, Type: Assign, Value: -1}
        - {Name: ThirdProtocol, Namespace: ST_Quests, Type: Assign, Value: "?switch[<TempQuests.ThirdProtocol>, 1:0, <TempQuests.ThirdProtocol>]"}
        - {Name: Bruteforce, Namespace: ST_Quests, Type: Assign, Value: "?switch[<TempQuests.Bruteforce>, 1:0, <TempQuests.Bruteforce>]"}
        - {Name: SecureConnection, Namespace: ST_Quests, Type: Assign, Value: "?switch[<TempQuests.SecureConnection>, 1:0, <TempQuests.SecureConnection>]"}
        - {Name: TreasureHunt, Namespace: ST_Quests, Type: Assign, Value: "<TempQuests.TreasureHunt>"}
        - {Name: ServiceEntrance, Namespace: ST_Quests, Type: Assign, Value: "<TempQuests.ServiceEntrance>"}
        - {Name: RaresCollector, Namespace: ST_Quests, Type: Assign, Value: "<TempQuests.RaresCollector>"}
    SetBestRank:
      Conditions: [{ConditionType: CounterRange, Namespace: ST_Quests, Name: ThirdProtocol, Equal: -1}]
      CounterActions: {OnEnter: [{Name: BestRank, Namespace: ST_Statistics, Type: Assign, Value: '?getBalance[Quests,ThirdProtocol,RankNeeded]'}]}
    SetBestBruteforce:
      Conditions: [{ConditionType: CounterRange, Namespace: ST_Quests, Name: Bruteforce, Equal: -1}]
      CounterActions: 
        OnEnter: 
        - {Name: Progress8Floor, Namespace: ST_Statistics, Type: Assign, Value: '?getBalance[Quests,Bruteforce,LocksCountOnFloor]'}
        - {Name: Progress10Floor, Namespace: ST_Statistics, Type: Assign, Value: '?getBalance[Quests,Bruteforce,LocksCountOnFloor]'}
        - {Name: Progress12Floor, Namespace: ST_Statistics, Type: Assign, Value: '?getBalance[Quests,Bruteforce,LocksCountOnFloor]'}
      
CountersUpdater_DATAGATHERER:
  Select: {Type: Items, Root: All}
  StringActions: {OnEnter: [{Name: Item, Value: "?getString[SelectKey]"}]}
  BoxContent:
    Head:
      Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[Item]', Head]}]
      Select: {Type: ItemGroups, Root: Head} 
      CounterActions: {OnEnter: [{Name: "?getItemAttribute[Head,?getString[SelectKey],Rarity]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}]}
    Torso:
      Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[Item]', Torso]}]
      Select: {Type: ItemGroups, Root: Torso} 
      CounterActions: {OnEnter: [{Name: "?getItemAttribute[Torso,?getString[SelectKey],Rarity]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}]}
    Legs:
      Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[Item]', Legs]}]
      Select: {Type: ItemGroups, Root: Legs} 
      CounterActions: {OnEnter: [{Name: "?getItemAttribute[Legs,?getString[SelectKey],Rarity]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}]}
    Hands:
      Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[Item]', Hands]}]
      Select: {Type: ItemGroups, Root: Hands} 
      CounterActions: {OnEnter: [{Name: "?getItemAttribute[Hands,?getString[SelectKey],Rarity]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}]}
    Belt:
      Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[Item]', Belt]}]
      Select: {Type: ItemGroups, Root: Belt} 
      CounterActions: {OnEnter: [{Name: "?getItemAttribute[Belt,?getString[SelectKey],Rarity]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}]}
    Stunts:
      Conditions: [{ConditionType: ValuesEqual, Values: ['?getString[Item]', Stunts]}]
      Select: {Type: ItemGroups, Root: Stunts} 
      CounterActions: {OnEnter: [{Name: "?getString[SelectKey]", Namespace: UUPDATE_STUNTS, Type: Assign, Value: 1}]}
    IsStarterPack:
      Conditions:
      - {ConditionType: GroupExists, Item: "?getString[Item]", Group: "ItemType"}
      - {ConditionType: ValuesEqual, Values: ['?getItemAttribute[?getString[Item], ItemType, Type]', 'StarterPack']}
      - {ConditionType: GroupExists, Item: "?getString[Item]", Group: "BlockedStarterPack", Not: 1}
      CounterActions: {OnEnter: [{Name: 'StarterPackCoolness', Namespace: UUPDATE, Type: Assign, Value: "?max[<UUPDATE.StarterPackCoolness>, ?getBalance[StarterPacks,?getString[SelectKey],Coolness]]"}]}
      
CountersUpdater_PREGENERATEPASSIVES:
  Select: {Type: Balance, Root: 'PassiveSpace', Weight: '?getCardInfo[?getString[SelectKey],Balance,Weight]', Random: 1}
  BoxContent:
    YellowCard:
      Conditions:
      - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', ''], Not: 1}
      - {ConditionType: CounterRange, Namespace: UUPDATE_PASSIVES, Name: YellowCardsPregenerated, Max: '{<UUPDATE_PASSIVES.2>-1}'}
      - {ConditionType: ValuesEqual, Values: ['?getCardInfo[?getString[SelectKey],Stats,Rarity]', 2]}
      - {ConditionType: ValuesEqual, Values: ['?lessEqual[?getCardInfo[?getString[SelectKey],Balance,SetupMin], <UUPDATE.StarterPackCoolness>]', 1]}
      CounterActions:
        OnEnter:
        - {Name: "YellowCardsPregenerated", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}
        - {Name: "?concat['YELLOW_%1', ?getCardInfo[?_getString[SelectKey],Stats,Slot]]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}
    RedCard:
      Conditions:
      - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', ''], Not: 1}
      - {ConditionType: CounterRange, Namespace: UUPDATE_PASSIVES, Name: RedCardsPregenerated, Max: '{<UUPDATE_PASSIVES.3>-1}'}
      - {ConditionType: ValuesEqual, Values: ['?getCardInfo[?getString[SelectKey],Stats,Rarity]', 3]}
      - {ConditionType: ValuesEqual, Values: ['?lessEqual[?getCardInfo[?getString[SelectKey],Balance,SetupMin], <UUPDATE.StarterPackCoolness>]', 1]}
      CounterActions:
        OnEnter:
        - {Name: "RedCardsPregenerated", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}
        - {Name: "?concat['RED_%1', ?getCardInfo[?_getString[SelectKey],Stats,Slot]]", Namespace: UUPDATE_PASSIVES, Type: IncrementBy, Value: 1}
      
CountersUpdater_KILLITEMS:
  ItemActions:
    OnEnter:
    - {Name: Head, Type: "Remove"}
    - {Name: Torso, Type: "Remove"}
    - {Name: Legs, Type: "Remove"}
    - {Name: Hands, Type: "Remove"}
    - {Name: Belt, Type: "Remove"}
    - {Name: Stunts, Type: "Remove"}
    - {Name: StarterPackBuff, Type: "Remove", IsPartOfName: 1}
    
