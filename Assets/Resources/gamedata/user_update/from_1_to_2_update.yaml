ItemsUpdater_CardsRefactoring:
  NoShuffle: 1
  BoxContent:
    Update:
      Conditions: [{ConditionType: GroupExists, Item: "?getString[Upd_ItemName]", Group: "ST_DefaultItemImage"}]
      GroupContent: {ST_VisualData: {ST_ItemImage: '?getItemAttribute[?getString[Upd_ItemName],ST_DefaultItemImage,ST_ItemImage]'}}
    StarterPackBuff:
      Conditions: [{ConditionType: GroupExists, Item: "?getString[Upd_ItemName]", Group: "StarterPackBuff"}]
      GroupContent: {StarterPackBuff: {NoIterable: 1}}
    NoUpdate: {}

CountersUpdater_CardsRefactoringClear:
  CounterActions:
    OnEnter:
    - {Namespace: uupdate_CardsItems, Type: Clear}
    - {Namespace: uupdate_Torso, Type: Clear}
    - {Namespace: uupdate_Head, Type: Clear}
    - {Namespace: uupdate_Legs, Type: Clear}
    - {Namespace: uupdate_Hands, Type: Clear}
    - {Namespace: uupdate_Belt, Type: Clear}
    - {Namespace: uupdate_Stunts, Type: Clear}

NewItems_BlockedStarterPacks:
  StandardProtocol:
    Target: NewStashItem
    Set: 1
    NoShuffle: 1
    BoxContent:
      Create:
        Conditions: [{ConditionType: CounterRange, Name: StandardProtocolQuest, Namespace: ST_Quests, Equal: -1, Not: 1}]
        GroupContent:
          ItemType:  {Type: StarterPack}
          ST_Item_1: {Preset: "?_getBalance[StarterPacks,StandardProtocol,ItemPreset1]"}
          ST_Item_2: {Preset: "?_getBalance[StarterPacks,StandardProtocol,ItemPreset2]"}
          Charges:
            MaxCharges: "?getBalance[StarterPacks, StandardProtocol, MaxCharges]"
            CurrentCharges: "?getGroupAttribute[Charges,MaxCharges]"
            RechargeTime: "?_getBalance[StarterPacks, StandardProtocol, RechargeTime]"
            ChargePrice: "?_getBalance[StarterPacks, StandardProtocol, ChargePrice]"
