ReplaceRegularExpression:
  NoShuffle: 1
  BoxContent:
    RegularExpression1:
      Regular: 'ST_DisplayItem'
      Replace: 'ST_VisualData'
    RegularExpression2:
      Regular: ''
      Replace: ''
      
CountersUpdater_CardsRefactoring:
  Select: {Type: Items, Root: Stash}
  Set: 1
  NoShuffle: 1
  BoxContent: 
    ThisIsCardsItem:
      Conditions:
      - ConditionType: Or
        Content:
        - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', 'Torso']}
        - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', 'Head']}
        - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', 'Hands']}
        - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', 'Legs']}
        - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', 'Belt']}
        - {ConditionType: ValuesEqual, Values: ['?getString[SelectKey]', 'Stunts']}
      StringActions: {OnEnter: [{Name: SlotKey, Value: '?getString[SelectKey]'}]}
      CounterActions: {OnEnter: [{Name: '?getString[SelectKey]', Namespace: "uupdate_CardsItems", Type: Assign, Value: 1}]}
      NoShuffle: 1
      BoxContent:
        MakeCounters:
          Select: {Type: ItemGroups, Root: '?getString[SlotKey]'}
          Set: 1
          NoShuffle: 1
          BoxContent:
            GenerateCounters:
              Conditions:  [{ConditionType: ValuesEqual, Values: ['?getItemAttribute[?getString[SlotKey],?getString[SelectKey],Existing]', '1']}]
              CounterActions: {OnEnter: [{Name: '?getString[SelectKey]', Namespace: "?concat['uupdate_%1', ?_getString[SlotKey]]", Type: Assign, Value: 1}]}
            Continue: {}
        RemoveItems:
          ItemActions: {OnExit: [{Name: '?getString[SlotKey]', Type: 'Remove'}]}
    Continue: {}

NewItems_CardsRefactoring:
  NewTorso:
    Target: {Type: NewItem, Destination: Stash}
    Set: 1
    NoShuffle: 1
    BoxContent:
      Create:
        Conditions: [{ConditionType: CounterRange, Name: Torso, Namespace: uupdate_CardsItems, Equal: 1}]
        GroupContent: {ST_ItemMainData: {ST_ItemName: 'Torso', ST_VisualItemName: "^Gadgets.SlotsVisualNames.Torso^"}, ST_VisualData: {ST_ItemImage: '?_getBalance[Slots,Torso,Image]', NoIterable: 1}}
        Select: {Type: Cards}
        Set: 1
        NoShuffle: 1
        BoxContent: 
          OwnedCard:
            Conditions: [{ConditionType: CounterRange, Name: '?getString[SelectKey]', Namespace: uupdate_Torso, Equal: 1}]
            GroupContent: {'?getString[SelectKey]': {IsNew: 0}}
          Continue: {}
      DontCreate:  
        GroupContent:
          ST_Expiration: {ST_ExpirationType: Frames, ST_ExpirationTime: 1}
          ItemType: {Type: Trash}
