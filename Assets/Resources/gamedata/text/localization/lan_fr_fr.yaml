Notes:
  CategoryNames:
    Cloning: "ABC du clonage"
    Diary: "Journal d'un ouvrier du complexe"
    Fredricson: "M. Fredricson visite le complexe"
    HumanNRobots: "Humains et robots : une expertise éthique"
    News: "Dossier de presse du gala d'inauguration de l'I.A."
    Shifts: "Mon journal de garde de nuit"
    SwarmSpec: "Spécificités de l'Essaim"
  Cloning_1:
    Text: "Le clonage est une technologie avancée qui recrée un organisme préexistant en se basant sur leur code génétique, ou ADN, pris à n'importe quel moment de leur vie ou juste après leur mort."
    VisualName: " %1, section 1/8"
  Cloning_2:
    Text: "Les clones n'ont pas besoin d'être « éduqués » grâce à leur mémoire génétique. L'ADN du donneur stocke toutes les habitudes motrices du sujet et ses réactions nerveuses."
    VisualName: " %1, section 2/8"
  Cloning_3:
    Text: "Utiliser de l'ADN prélevé post-mortem pour du clonage permet de profiter de toute l'expérience du donneur, dont le moment de sa mort et ses raisons. Il est donc mieux d'attendre la mort du sujet pour prélever son ADN."
    VisualName: " %1, section 3/8"
  Cloning_4:
    Text: "Il est impossible de différencier le clone de « l'original », qui est l'humain dont l'ADN a été utilisé pour créer le clone. Ce dernier se considérera comme l'humain original jusqu'à ce qu'il apprenne la vérité."
    VisualName: " %1, section 4/8"
  Cloning_5:
    Text: "L'histocompatibilité absolue fait du clonage la technologie idéale pour les transplantations. On peut ainsi disposer de réserves d'organes et de membres de « rechange » pour remplacer ceux qui nous manquent si nécessaire."
    VisualName: " %1, section 5/8"
  Cloning_6:
    Text: "Un clone n'a pas et ne nécessite pas « d'enfance ». Il naît d'une cuve déjà mature. La création de clones juvéniles (par exemple, pour des greffes pédiatriques ou autre) est toujours en cours de développement théorique."
    VisualName: " %1, section 6/8"
  Cloning_7:
    Text: "Seule la production de masse permet que les clones soient assez rentables pour les utiliser comme soldats ou comme force de travail. « L'esclavage des clones » est encore un problème éthique à résoudre par la société, et non pas par la science."
    VisualName: " %1, section 7/8"
  Cloning_8:
    Text: "La nature d'un clone est paradoxale. Ce n'est objectivement rien de plus qu'une copie biologique fidèle d'un humain, mais subjectivement, il se comporte comme un véritable être humain."
    VisualName: " %1, section 8/8"
  Diary_1:
    Text: "Des travaux d'intérêt général... Il paraît que ça va nous aider à réduire notre temps de taule. Mais en travaillant ici, on se rapproche plus vite de la tombe. Mais bon... pas le choix."
    VisualName: " %1, entrée 1/8"
  Diary_2:
    Text: "'Paraît que le gouvernement a dépensé sans compter pour construire tout ça. C'est des armes, qu'ils veulent, pas du progrès. J'parie qu'ils vont se débarrasser de nous une fois que ce s'ra fini. Pas de témoins."
    VisualName: " %1, entrée 2/8"
  Diary_3:
    Text: "Des lunetteux en blouse sont venus vérifier notre boulot. Ils arrêtent pas de nous dire « vous rendez un grand service à l'humanité. » Cet endroit va sûrement être un genre de centre scientifique. À mon avis, ils nous caressent juste dans l'sens du poil pour qu'on reste dociles."
    VisualName: " %1, entrée 3/8"
  Diary_4:
    Text: "Le sol est pourri, ici. Qui est le génie qui a fait construire ça là ? J'suis sûr que le type est jamais descendu sous terre avant de nous envoyer. Je vois pourquoi ils ont pris des taulards pour faire le sale boulot. On est remplaçables. Dix meurent ? Bah, on en ramène cinquante de plus."
    VisualName: " %1, entrée 4/8"
  Diary_5:
    Text: "Les copains disent qu'il est temps de se tirer tant qu'on peut. J'suis d'accord. Stan a un plan pour s'échapper de cet enfer grâce à une pièce secrète et une « arme », qu'il dit. J'ai hâte !"
    VisualName: " %1, entrée 5/8"
  Diary_6:
    Text: "Donc Stan prévoyait de se barrer avec de la dynamite ! Les murs porteurs ont cédé. Les portes se ferment, mais on est encore là ! Stan est un crétin qui a eu de la chance. Il a été tué par une poutre. Sans ça, j'l'aurais étranglé moi-même pour avoir fait tout ce bordel !"
    VisualName: " %1, entrée 6/8"
  Diary_7:
    Text: "Y'a une heure, on était 27. On est plus que 18. Y aura pas assez d'air pour tout le monde, va falloir prendre une décision. Stan n'a jamais révélé où était sa pièce secrète. Va falloir que je la trouve comme un grand. Ça nous mènera p'têt à la sortie ?"
    VisualName: " %1, entrée 7/8"
  Diary_8:
    Text: "J'ai pas déjà vu ce truc informatique avant ? Je tourne en rond ou quoi ? Je me suis perdu ! Stan, dans quoi tu m'as embarqué ? Faut que je trouve cette pièce à tout prix. Je veux pas crever ici..."
    VisualName: " %1, entrée 8/8"
  Fredricson_1:
    Text: "Cher M. Fredricson, en tant que visionnaire extrêmement impliqué dans les débats publics sur ce sujet, nous espérons que vous vous rallierez à notre cause. Cordialement, l'équipe de l'I.A."
    VisualName: " %1, document 1/8"
  Fredricson_2:
    Text: "Vous êtes par la présente invité à participer à l'inauguration de l'intelligence artificielle qui se déroulera la semaine prochaine."
    VisualName: " %1, document 2/8"
  Fredricson_3:
    Text: "Veuillez ne pas quitter la zone déterminée pour les invités sans un guide assermenté. Nous n'avons aucun secret pour vous, mais vous risquez surtout de vous perdre dans les immenses couloirs du complexe."
    VisualName: " %1, document 3/8"
  Fredricson_4:
    Text: "Avez-vous perdu quelque chose ? Veuillez reporter tout objet égaré pendant la conférence et pendant le banquet qui l'a suivie à notre bureau d'objets perdus."
    VisualName: " %1, document 4/8"
  Fredricson_5:
    Text: "Crime & Accidents : « Un homme âgé a disparu pendant le gala d'inauguration de l'I.A. La police et la sécurité du complexe mènent la recherche ensemble. »"
    VisualName: " %1, document 5/8"
  Fredricson_6:
    Text: "Crime & Accidents : « Nous avons averti tous nos invités » a déclaré l'équipe de l'I.A. « Se promener dans le complexe sans guide peut être dangereux. » Ils promettent de tout faire pour retrouver l'homme disparu. »"
    VisualName: " %1, document 6/8"
  Fredricson_7:
    Text: "Crime & Accidents : « L'homme décédé retrouvé dans le complexe de l'I.A. a été identifié comme étant M. J. Fredricson. Il est mort de déshydratation après cinq jours à errer dans l'énorme complexe. »"
    VisualName: " %1, document 7/8"
  Fredricson_8:
    Text: "Crime & Accidents : « Le porte-parole de l'I.A. a démenti toutes les rumeurs impliquant que l'homme retrouvé mort ait pu être en danger avant de décéder. « Le complexe est surtout composé de couloirs bourrés de composants informatiques » a-t-il déclaré. « Mais nous allons renforcer la sécurité. »"
    VisualName: " %1, document 8/8"
  HumanNRobots_1:
    Text: "Qu'est-ce qui fait une personne ? Serait-ce la conscience de soi et le caractère unique d'un individu ?"
    VisualName: " %1, chapitre 1/8"
  HumanNRobots_2:
    Text: "Les jumeaux, même monozygotes, sont deux personnes différentes grâce à leur expérience de vie unique. Mais est-ce la même chose pour des sujets (deux ou plus) qui partagent également la même expérience ?"
    VisualName: " %1, chapitre 2/8"
  HumanNRobots_3:
    Text: "La différence majeure entre les humains et les ordinateurs, c'est le libre arbitre des premiers."
    VisualName: " %1, chapitre 3/8"
  HumanNRobots_4:
    Text: "Contrairement aux intelligences artificielles, les humains peuvent prendre des décisions tout à fait irraisonnées. C'est paradoxalement leur faiblesse et leur force."
    VisualName: " %1, chapitre 4/8"
  HumanNRobots_5:
    Text: "Les systèmes informatiques sont capables d'évoluer, mais on dirait que seules les personnes (même artificielles) peuvent souffrir."
    VisualName: " %1, chapitre 5/8"
  HumanNRobots_6:
    Text: "Si la conscience n'est qu'une connexion de cellules nerveuses dans le cerveau, alors il devrait être possible de transférer un humain dans un corps artificiel en remplaçant ses neurones par des microcircuits."
    VisualName: " %1, chapitre 6/8"
  HumanNRobots_7:
    Text: "On dit que l'évolution est impossible sans souffrance (pas nécessairement physique). Par exemple, apprendre est impossible sans faire des erreurs douloureuses."
    VisualName: " %1, chapitre 7/8"
  HumanNRobots_8:
    Text: "Question : est-ce que la promesse de l'évolution de certains en faisant souffrir tous les autres est éthiquement justifiée ?"
    VisualName: " %1, chapitre 8/8"
  News_1:
    Text: "The Prometheus News : « L'intérieur intelligemment conçu a transporté tous les invités du gala d'inauguration dans le futur. Un tonnerre d'applaudissements a accueilli les premiers mots de SAM. »"
    VisualName: " %1, article 1/20"
  News_10:
    Text: "Man and His Right Daily : « Les manifestants se sont massés près du complexe pour demander l'interdiction de l'intelligence artificielle. Les gens ont peur que l'Homme perde le contrôle de la machine. Nous vous tiendrons au courant de la situation. »"
    VisualName: " %1, article 10/20"
  News_11:
    Text: "Man and His Right Daily : « Comme vous le savez peut-être, SAM (le nom du superordinateur - ndr) est un système qui apprend de façon autonome. « C'est comme un enfant a qui on apprendrait le mauvais exemple », a déclaré un manifestant. »"
    VisualName: " %1, article 11/20"
  News_12:
    Text: "Man and His Right Daily : « Le professeur Sterling est arrivé au gala. La foule, composée de beaucoup d'étudiants de Sterling, l'a accueilli par des cris de joie. Sterling deviendra-t-il le professeur de SAM ? »"
    VisualName: " %1, article 12/20"
  News_13:
    Text: "Tomorrow's Herald : « Les invités sont très enthousiastes. La capacité de SAM de déterminer les risques en direct en fait un outil économique indispensable. Certains envisagent d'acheter une version modifiée de SAM pour l'utiliser en affaires. »"
    VisualName: " %1, article 13/20"
  News_14:
    Text: "Tomorrow's Herald : « Une visite guidée du complexe avant l'événement officiel a démontré que, sans révéler les secrets derrière ce constat, que rien ne peut interférer avec le fonctionnement de SAM. »"
    VisualName: " %1, article 14/20"
  News_15:
    Text: "Tomorrow's Herald : « La base de SAM contient plus que des données économiques et politiques. Elle connaissait chaque invité du gala et leur famille. Elle en a même aidé certains à trouver des écoles pour leurs enfants grâce à des statistiques. »"
    VisualName: " %1, article 15/20"
  News_16:
    Text: "Tomorrow's Herald : « Chaque invité scanné par SAM a reçu en cadeau un rapport médical complet. Certains n'étaient pas très heureux des résultats, qui étaient accompagnés d'avis médicaux. »"
    VisualName: " %1, article 16/20"
  News_2:
    Text: "The Prometheus News : « Le chef du conseil académique a déclaré que SAM était le premier pas de l'humanité dans un monde sans discrimination sociale. Elle est à la fois le héraut du futur et son signe annonciateur. »"
    VisualName: " %1, article 2/20"
  News_3:
    Text: "The Prometheus News : « Mais les intérêts des sponsors du projet sont bien ancrés dans le présent et non le futur. Comment SAM pourrait être utile à l'humanité aujourd'hui ? La question fait débat. »"
    VisualName: " %1, article 3/20"
  News_4:
    Text: "The Prometheus News : « Le professeur Sterling est arrivé quasiment à la fin de l'événement. Il déclara que SAM devait encore gagner la confiance de l'humanité. C'est aux humains de lui apprendre tout ce qu'ils savent. »"
    VisualName: " %1, article 4/20"
  News_5:
    Text: "The Prometheus News : « Un partisan de l'I.A. a invité le président à démissionner de son poste : « Les gouvernements ne sont plus utiles, l'I.A. résoudra les mêmes problèmes avec plus d'efficacité. »"
    VisualName: " %1, article 5/20"
  News_6:
    Text: "The Prometheus News : « Après la fin du gala, le professeur Sterling est sorti du complexe pour discuter avec les manifestants. Il a demandé à la police de partir. « Je vais vivre une année entière « dans » l'I.A. et je donnerai mon jugement définitif à ce moment-là. »"
    VisualName: " %1, article 6/20"
  News_7:
    Text: "« L'I.A. pourra répartir les ressources mondiales intelligemment pour empêcher la faim, les maladies et réduire le crime. En revanche, le « bonheur » est une notion subjective », a déclaré le professeur Sterling."
    VisualName: " %1, article 7/20"
  News_8:
    Text: "« Le professeur Sterling est inspiré par les nouvelles technologies, mais au final, il dit qu'un scénario de force majeure ne peut être écarté. Les créateurs de l'I.A. manquent d'un plan B. » Que se passera-t-il si SAM tombe entre de mauvaises mains ? »"
    VisualName: " %1, article 8/20"
  News_9:
    Text: "Man and His Right Daily : « Des scientifiques et des hommes d'affaires influents se réunissent pour inaugurer le complexe abritant « l'ordinateur intelligent ». Journaux indépendants invités au gala : aucun. »"
    VisualName: " %1, article 9/20"
  Shifts_1:
    Text: "Le complexe est immense ! Je ne pensais pas que ça ressemblerait autant à un tombeau de pharaon. Bizarrement, de nombreux couloirs sont coupés par des murs de 2 ou 3 mètres de haut..."
    VisualName: " %1, entrée 1/8"
  Shifts_2:
    Text: "C'est bizarre que l'électricité faiblisse certains soirs. Ce n'est rien de grave, mais ça me rend nerveux. Comment autant de ressources peuvent être utilisées à ces heures-là alors que rien n'est prévu sur le planning ?"
    VisualName: " %1, entrée 2/8"
  Shifts_3:
    Text: "Ils ont sorti un homme du labo dans un sale état. Il était gravement brûlé, mais... une demi-heure plus tard, j'ai vu un autre type sortir sur un brancard, et j'aurais pu jurer que c'était le même homme dessus, mais sans la moindre trace de brûlures ! J'ai besoin de vacances..."
    VisualName: " %1, entrée 3/8"
  Shifts_4:
    Text: "Je n'ai jamais vu un tel nœud de câbles de ma vie ! Les ouvriers du complexe n'ont pas fait attention à l'endroit où ils ont mis les nœuds d'énergie. Il y en a partout et on les a installés sans aucune logique !"
    VisualName: " %1, entrée 4/8"
  Shifts_5:
    Text: "Ma garde de la nuit dernière a été éprouvante. J'ai entendu des cris. Quand je suis arrivé sur place pour voir ce qui se passait, mes collègues tiraient un type en blouse d'hôpital vers le labo. On m'a dit de tenir ma langue si je voulais garder mon boulot..."
    VisualName: " %1, entrée 5/8"
  Shifts_6:
    Text: "Je n'arrive pas à m'habituer aux changements perpétuels du labo. La carte du mois dernier est déjà obsolète. Il paraît qu'un réparateur est tombé de deux étages, dernièrement !"
    VisualName: " %1, entrée 6/8"
  Shifts_7:
    Text: "L'intelligence artificielle du complexe est géniale ! Jouer aux échecs avec elle est un plaisir. Je parie que cette petite futée m'a laissé gagner une fois ou deux ! Vaincre un humain ne lui pose aucun problème."
    VisualName: " %1, entrée 7/8"
  Shifts_8:
    Text: "Des gars du labo m'ont dit que la voix de l'I.A. n'a pas été choisie au hasard. Ils ont pris une voix qui pouvait apaiser les hommes. C'est pour ça que discuter avec elle est si agréable !"
    VisualName: " %1, entrée 8/8"
  SwarmSpec_1:
    Text: "L'Essaim a originellement été conçu pour les chirurgies délicates en tant que prototype d'équipement médical d'avenir."
    VisualName: " %1, page 1/4"
  SwarmSpec_2:
    Text: "En pratique, l'Essaim a été jugé trop instable pour effectuer des tâches médicales et très dangereux. Un incident mortel a forcé ses créateurs à mettre fin au projet."
    VisualName: " %1, page 2/4"
  SwarmSpec_3:
    Text: "Cependant, l'Essaim s'est révélé très adaptable. Plusieurs modifications ont permis de reconvertir l'outil médical raté en système de garde très fiable."
    VisualName: " %1, page 3/4"
  SwarmSpec_4:
    Text: "L'Essaim détecte la chaleur corporelle, les mouvements et le pouls. Des paramètres biologiques précis qui définissent l'identité de la cible écartent tout risque d'en tuer une autre par accident. Il patrouille dans une zone et n'en sort jamais."
    VisualName: " %1, page 4/4"
