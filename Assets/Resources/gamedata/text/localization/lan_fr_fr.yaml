      '1': "Pour atteindre un rang plus élevé, cherchez des améliorations qui attribuent un maximum de points."
      '2': "Il faut des puces de données pour utiliser certaines fonctions.\nUtilisez le détecteur de puces pour dénicher ces microprocesseurs ou gagnez du temps en achetant un pack de puces de données."
      '3': "Il est possible de recharger l'énergie gratuitement !\n\nVous pouvez obtenir des recharges d’énergie dans des kits d'Amélioration ou à l'aide d'un détecteur de recharge."
      '4': "Échappez à la Grande Faucheuse sans dépenser de jetons !\n\nVous pouvez obtenir des réanimations gratuites dans les kits d'Amélioration ou à l'aide d'un détecteur de réanimation."
      '5': "Montrez-vous stratégique pour atteindre vos objectifs !\n\nRafraîchissez les améliorations au Poste d'Équipement afin d'obtenir le matériel nécessaire pour faire des étincelles !"
      '6': "Certaines améliorations sont optimisées lorsqu'elles sont activées ensemble !\n\nEssayez d'utiliser Mécanismes de précision avec Évaluation étendue."
      '7': "Certaines améliorations sont optimisées lorsqu'elles sont activées ensemble !\nEssayez d'utiliser Analyseur de données de recherche avec Poussée d'adrénaline."
      '8': "Vous devez marquer des points pour accéder à des rangs plus élevés.\n\nPour booster votre score, réalisez des figures et explorez entièrement des étages.\nVous voulez un max de points ? Utilisez des améliorations !"
      '9': "Les améliorations ultimes peuvent faire de vous une véritable force de la nature.\n\nExplorez intégralement des étages lointains pour accéder à ces modules dernier cri. N'hésitez pas à utiliser des kits d'Amélioration pour dénicher encore plus d'améliorations ultimes !"
      '10': "Faites évoluer vos améliorations !\n\nÉtudiez plusieurs fois chaque amélioration pour en booster la puissance."
      '11': "Chaque clone commence avec un nouvel équipement et n'a encore atteint aucun rang."
