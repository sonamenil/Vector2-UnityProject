Notes:
  CategoryNames:
    Cloning: "クローンの基礎"
    Diary: "施設建設者の日記"
    Fredricson: "フレデリクソン氏が施設を訪問"
    HumanNRobots: "人類とロボット：倫理審査"
    News: "人工知能祭開会式典マスコミ関連書類"
    Shifts: "夜勤シフトの記録"
    SwarmSpec: "スワームの仕様書"
  Cloning_1:
    Text: "クローンは、既存の生物有機体が死んだ直後に採取した遺伝子コードあるいはDNAに基づいて人工的に再作成できる先進技術です。"
    VisualName: " %1、セクション1/8"
  Cloning_2:
    Text: "クローンには遺伝記憶があるので、「教育」する必要がありません。ドナーのDNAにはサブジェクトのあらゆる運動配列および神経反応が記憶されています。"
    VisualName: " %1、セクション2/8"
  Cloning_3:
    Text: "クローンに死後のDNAを使用すれば、死の瞬間およびその要因も含め、ドナーの人生経験を最大限に活用することができます。従って、採取は死んだ直後まで待った方が良いとされています。"
    VisualName: " %1、セクション3/8"
  Cloning_4:
    Text: "クローンの作成に使用されたDNAの持ち主である人間とクローンを区別することは不可能です。クローン自体が元の人間とそっくりそのままなので、答えを知らされない限り判断できませんよ。"
    VisualName: " %1、セクション4/8"
  Cloning_5:
    Text: "完全な組織適合性を実現すれば、クローンは移植に理想的な技術になるでしょう。「予備」の臓器や手足をセットにして保管し、必要な時に入れ替えることができるのですから。"
    VisualName: " %1、セクション5/8"
  Cloning_6:
    Text: "器官は成熟した状態でタンクから出てくるので、クローンには「幼少期」がなく、その必要性もありません。小児移植またはその他の目的で幼いクローンを作成することについては、まだ理論が展開されています。"
    VisualName: " %1、セクション6/8"
  Cloning_7:
    Text: "肉体労働や兵役に使用するために個人のクローン生産費用を抑えるには、大量生産をする以外他にありません。「クローン奴隷」は、科学的ではなく、社会的な倫理問題として残るでしょう。"
    VisualName: " %1、セクション7/8"
  Cloning_8:
    Text: "クローンの二重の性質を持ち合わせています。客観的には人間の完全な生物学的コピーですが、主観的にもまるで本物の人間のように考え行動するんですよ。"
    VisualName: " %1、セクション8/8"
  Diary_1:
    Text: "彼らはコミュニティーサービースと名乗った。刑期を短縮してくれると言う。もちろん、ここで働いていると寿命が縮まるのは目に見えている...これ以外に選択肢はあっただろうか？"
    VisualName: " %1、エントリー1/8"
  Diary_2:
    Text: "この施設を作り上げたのは政府だと言う人もいる。これは彼らの欲する武器であり、躍進ではない。仕事を終えたら、彼らはきっと私たちを'処分'するだろう。"
    VisualName: " %1、エントリー2/8"
  Diary_3:
    Text: "今日、研究所の職員たちが私たちの仕事ぶりをチェックしに来た。彼らは「あなたは人類に役立つ行いをしている。」と言う。ここは科学センターのような場所になるのだろう。こちらがきちんと仕事をこなすよう、うまく口を利くものだ。"
    VisualName: " %1、エントリー3/8"
  Diary_4:
    Text: "ここは土地の質が悪い。ここに施設を建設しようと言い出したのは誰だろう？私たちを送ってくる前に、その男は地下に潜らなかった。彼らが囚人をここに雇っている理由がはっきりとわかった。私たちは処分可能からだ。10人死んでも、また50人を連れ出して来ればいい話だ。"
    VisualName: " %1、エントリー4/8"
  Diary_5:
    Text: "仲間はできる間にここから抜け出そうと言っている。もっともな意見だ。スタンは秘密の部屋と'武器'が隠されているこの恐ろしい場所の脱出計画を立てているようだ。計画の実行が待ちきれない！"
    VisualName: " %1、エントリー5/8"
  Diary_6:
    Text: "スタンの計画はすごかった！荷重負荷構造が開いたのだ！出口が閉じかけているのに、私たちはまだここにとどまっていた！スタンは馬鹿な奴だ...梁に打たれて死んだ。じゃなかったら、こっちが奴を絞め殺していただろう！"
    VisualName: " %1、エントリー6/8"
  Diary_7:
    Text: " 1時間前は27歳だったが、今は18歳になってしまった。ここは空気不足だ。決断を下さないと。スタンは秘密の部屋の場所を口に出すことはなかった。どうやら自力で探す必要があるようだ。そこにも逃げ道はあるだろうか？"
    VisualName: " %1、エントリー7/8"
  Diary_8:
    Text: "このコンピューターみたいなのは、どこかで見たことがあるぞ？私は周回しているだけなのだろうか？あろうことか、道に迷ってしまったようだ！スタン、私をとんだ災難に巻き込んだな。その秘密の部屋を何としてでも探さないと。こんなところで死にたくない..."
    VisualName: " %1、エントリー8/8"
  Fredricson_1:
    Text: "親愛なるフレデリクソン様、本問題に関する公開議論のご意見番であるフレデリクソン様とぜひお近づきになれましたら幸いに存じます。敬具 - 人工知能チーム"
    VisualName: " %1、ドキュメント1/8"
  Fredricson_2:
    Text: "来週開催される大規模集会および人工知能の式典にご招待いたします。"
    VisualName: " %1、ドキュメント2/8"
  Fredricson_3:
    Text: "案内員の誘導なしでゲストエリアの外に出ないでください。隠し事はございませんが、施設の廊下の数が非常に多いため、迷ってしまう可能性があります。"
    VisualName: " %1、ドキュメント3/8"
  Fredricson_4:
    Text: "物を紛失された場合は、会議中またはその後の晩餐会で置き忘れた物は、全て遺失物取扱所でお受け取りください。"
    VisualName: " %1、ドキュメント4/8"
  Fredricson_5:
    Text: "犯罪＆事故：「式典の後、ご老人が行方不明になりました。警察と施設の警備員が捜索救助活動を行っています。」"
    VisualName: " %1、ドキュメント5/8"
  Fredricson_6:
    Text: "犯罪＆事故：「人工知能チーム：'私たちは、案内員なしで施設内を歩き回ることは危険だとゲストの皆様全員に忠告しておきました。'チームは失踪中の男性の捜索に尽力すると約束しました。」"
    VisualName: " %1、ドキュメント6/8"
  Fredricson_7:
    Text: "犯罪＆事故：「人工知能施設で男性の死体が見つかり、身元はJ.フレデリクソン氏であることが明らかになりました。彼は巨大施設の中で5日間さ迷ったのち、脱水が原因で死亡しました。」"
    VisualName: " %1、ドキュメント7/8"
  Fredricson_8:
    Text: "犯罪＆事故：「人工知能チームのスポークスマンは、亡くなった男性が死の直前に部外秘の危険にさらされたという噂に反論しています。'施設のほとんどはハードウェアだらけの人気の全くない廊下で構成されていますが、セキュリティーを今後改善する予定です。'」"
    VisualName: " %1、ドキュメント8/8"
  HumanNRobots_1:
    Text: "人を形作るものは何だろう？その人の個性と自己認識が結びついたものだろうか？"
    VisualName: " %1、第1/8章"
  HumanNRobots_2:
    Text: "遺伝学上同一であっても、双子は全く異なる人物である。それぞれ違う人生を進からだ。しかし、全く同じ人生を歩む複数のサブジェクトはこれに当てはまるだろうか？"
    VisualName: " %1、第2/8章"
  HumanNRobots_3:
    Text: "人類とコンピューターの決定的な違いの一つ。それは、人類には自由意志があるということだ。"
    VisualName: " %1、第3/8章"
  HumanNRobots_4:
    Text: "人類は人工知能と違い、不合理な選択もできる。そしてそれは皮肉なことに、長所でも短所でもある。"
    VisualName: " %1、第4/8章"
  HumanNRobots_5:
    Text: "コンピューターのシステムは発達させることができる。発達過程で深刻な悩みを抱えるのは人工知能を含む人類だけのようだ。"
    VisualName: " %1、第5/8章"
  HumanNRobots_6:
    Text: "人類の意識が単なる脳内にぎっしり詰まった神経細胞の相互連結で成り立っているだけだったとしたら、ニューロンを超小型回路に置き換えて人間を人工のハードウェアにしてしまうことも可能だろう。"
    VisualName: " %1、第6/8章"
  HumanNRobots_7:
    Text: "苦悩(身体的とは限らない)なしに進化することはできないという主張も存在する。例えば、過ちを犯して苦しまないと、経験から教訓を得ることはできない。"
    VisualName: " %1、第7/8章"
  HumanNRobots_8:
    Text: "ここで問題だ：進化するには苦悩が不可欠であることを倫理的に正当化することはできるだろうか？"
    VisualName: " %1、第8/8章"
  News_1:
    Text: "プロメテウスニュース通信：「設計された内部を見た式典のゲスト様は、まるで未来の世界にいるような気分になるでしょう。サムの最初の言葉に、嵐のような拍手が沸き起こりました。」"
    VisualName: " %1、切り抜き1/20"
  News_10:
    Text: "日刊人と人権：「反対派の人々は施設の周辺に集まり、人工知能の使用禁止を要求しています。皆様は人が将来コンピューターを制御できなくなってしまうかもしれないと懸念を抱いています。引き続き最新の情報をお伝えします。」"
    VisualName: " %1、切り抜き10/20"
  News_11:
    Text: "日刊人と人権：「ご存知の通り、サム(編集注記：スーパーコンピューターの名称)は自己学習機能を内蔵しているシステムです。反対派の人々は、'悪い手本も教え込めそうな子供のようだ'と訴えています。」"
    VisualName: " %1、切り抜き11/20"
  News_12:
    Text: "日刊人と人権：「スターリング教授が式典に到着しました。スターリング教授の生徒も混じっている群衆は、教授に大声で挨拶しています。スターリング教授がサムの先生を務めることになるのでしょうか？」"
    VisualName: " %1、切り抜き12/20"
  News_13:
    Text: "Tomorrow's Herald：「ゲストたちは夢中になっていました。サムの迅速なリスク管理能力は経済界に不可欠なツールにもなるでしょう。サムの修正版を購入してビジネスに役立てたいと話している人もいます。」"
    VisualName: " %1、切り抜き13/20"
  News_14:
    Text: "Tomorrow's Herald：「公式イベント開催前に行われた施設のガイドツアーに行ってきました。全ての秘密を公開せずとも、サムの稼働を妨害することは不可能であるとはっきりとわかりました。」"
    VisualName: " %1、切り抜き14/20"
  News_15:
    Text: "Tomorrow's Herald：「サムのデータベースに記録されている情報は、経済や政治の枠にとどまりません。彼女は式典のゲスト全員とゲストそれぞれのご家族について把握していました。さらに、統計データを参考にゲストのお子様の学校選びを手伝っていました。」"
    VisualName: " %1、切り抜き15/20"
  News_16:
    Text: "Tomorrow's Herald：「お礼に、サムはゲスト全員をスキャンし、ゲストは完全な医療報告書を貰いました。中には結果に落胆してしまった人もいるようです。報告書には健康のアドバイスも添えてありました。」"
    VisualName: " %1、切り抜き16/20"
  News_2:
    Text: "プロメテウスニュース通信：「学術評議会の議長は、サムを人類で'社会差別を撤廃するささやかな最初の一歩'と評しました。彼女は未来の使者であり、前触れでもあるのです。」"
    VisualName: " %1、切り抜き2/20"
  News_3:
    Text: "プロメテウスニュース通信：「しかし、プロジェクトのスポンサーの関心は未来ではなく、現在に集中しています。サムは現代の人々にどんな貢献ができるのか？この問題を巡って白熱の議論が展開されています。」"
    VisualName: " %1、切り抜き3/20"
  News_4:
    Text: "プロメテウスニュース通信：「イベント終了間近にスターリング教授が到着し、サムはまだ人間からの信頼を得る必要があり、彼女は全てを人間から学ぶので、まとは教える人間次第だと述べました。」"
    VisualName: " %1、切り抜き4/20"
  News_5:
    Text: "プロメテウスニュース通信：「人工知能の熱烈な支持者が大統領に中期で辞任するよう訴えました：'もはや政府は必要ない。人工知能の方が問題をもっと迅速に解決できる。'」"
    VisualName: " %1、切り抜き5/20"
  News_6:
    Text: "プロメテウスニュース通信：「式典が閉会した後、スターリング教授は反対派の人々と会うため、施設から姿を現しました。彼は警察に撤退するよう頼みました。「私自身が人工知能の'内部'で1年間過ごしてみて、最後の決断を下します。」"
    VisualName: " %1、切り抜き6/20"
  News_7:
    Text: "スターリング教授：「人工知能は世界の資源を賢く再配分し、飢えや病気を防いで犯罪を減らします。まさに'幸福'そのものです。しかし、これは私の主観的な見解です。」"
    VisualName: " %1、切り抜き7/20"
  News_8:
    Text: "「スターリング教授は新技術の発表を喜んでいるようですが、最後に不可抗力の事態が発生する可能性は払拭できないと付け加えました。人工知能の作成者は’計画B'を用意していないので、悪い人の手に渡ってしまった場合の対処方法が構築されていないのです。」"
    VisualName: " %1、切り抜き8/20"
  News_9:
    Text: "日刊人と人権：「一流の科学者と実業者たちが集まって、集合住宅を'知的コンピューター'にしていくことについて話し合いました。式典に招待された無料メディアの代表者はいませんでした。」"
    VisualName: " %1、切り抜き9/20"
  Shifts_1:
    Text: "巨大施設ですね！内部がファラオのお墓みたいな作りになっているなんて、想像もつきませんでしたよ。妙ですね、ここの多くの廊下は6から7フィートほどもある見えない壁で切断されています..."
    VisualName: " %1、エントリー1/8"
  Shifts_2:
    Text: "晩になると電圧振幅が起きることがあるなんて妙ですね。大したことではありませんが、なんかそわそわしちゃいます。試験日程でダッシュの印がついている時間内でこんなに大量の資源が消費されてしまうなんて、一体どうやったんですかね？"
    VisualName: " %1、エントリー2/8"
  Shifts_3:
    Text: "彼らは火傷のやけどを負った男性を研究所から救い出しましたが...その30分後、他の担架が見えたんです。そこに横たわっていた男性は、30分前に見た男性とそっくりそのままでしたが、全く火傷を負っていませんでした。この目で見たんです！ああ、休みがほしい..."
    VisualName: " %1、エントリー3/8"
  Shifts_4:
    Text: "ここまでぐちゃぐちゃに絡まっているケーブルは見たことがありませんよ！施設の建設者は電源ノードの配置に全くと言っていいほど気を配っていなかったようですね。そこら中に、ケーブルが散らばっています！"
    VisualName: " %1、エントリー4/8"
  Shifts_5:
    Text: "昨日の夜勤で度肝を抜く出来事があったんですよ。悲鳴が聞こえたんです。調査しに現場に向かったら、私の同僚が入院患者用の部屋着に身を包んだ男性を研究所に引っ張り込んでいました。この仕事を失いたくないなら黙っていなさいと言われました..."
    VisualName: " %1、エントリー5/8"
  Shifts_6:
    Text: "変化し続ける施設にまだ慣れませんよ。先月のマップなんか、もう古くて使えません。しかも、2階の高さから落ちてしまった修理工さんたちもいらっしゃるみたいですよ！"
    VisualName: " %1、エントリー6/8"
  Shifts_7:
    Text: "施設の人工知能は素晴らしい！彼女とチェスで遊ぶのは楽しいですよ。まあ、1、2回勝てましたが、きっとわざと負けてくれたんでしょう！もちろん、彼女にとっては人間を打ち負かすことなんてお茶の子さいさいですけどね。"
    VisualName: " %1、エントリー7/8"
  Shifts_8:
    Text: "研究所の人たちが教えてくれたんですが、人工知能の声はランダムに選ばれたものではないんですって。心が癒される声を探していたそうです。だから彼女と話しているといい気分になるんでしょうね！"
    VisualName: " %1、エントリー8/8"
  SwarmSpec_1:
    Text: "複雑な手術のために考案されたスワームは、医療機器の原型だったんですよ。"
    VisualName: " %1、ページ1/4"
  SwarmSpec_2:
    Text: "しかしスワームを実際に使用したところ、不安定で医療行為には向いておらず、それどころか大変危険であることが判明したのです。致命的な事故が発生したことを受け、作成者は製造計画を中止しました。"
    VisualName: " %1、ページ2/4"
  SwarmSpec_3:
    Text: "しかし、その一方でスワームは使い勝手が非常に柔軟であることも判明しました。そして幾多もの改良を重ねた結果、医療機器が信頼のおける警備システムに改造されたのです。"
    VisualName: " %1、ページ3/4"
  SwarmSpec_4:
