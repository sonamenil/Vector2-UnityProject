      '1': "もっと高ランクを達成するには、ポイントをさらに獲得できるアップグレードを探してみましょう。"
      '2': "データチップが必要な機能があります。\nチップ検出器を使用して見つけるか、データチップパックを購入して時間を節約しましょう。"
      '3': "エネルギーは無料で補充できます！\n\nアップグレードキットから、またはエネルギー補充検出器を使用して無料エネルギー補充を見つけてみましょう。"
      '4': "チップを消費せずに生き延びましょう！\n\nアップグレードキットから、または回復検出器を使用して無料蘇生を見つけてみましょう。"
      '5': "目標を達成すべく、策略を練ってみましょう！\n\n供給所でアップグレードをリロールし、走行に必要なものを手に入れましょう。"
      '6': "アップグレードの中には、相乗効果があるものがあります！\n\n拡大評価と一緒に正確なメカニズムを使用してみましょう。"
      '7': "アップグレードの中には、相乗効果があるものがあります！\nアドレナリン上昇と一緒に研究データ分析装置を使用してみましょう。"
      '8': "ランクを獲得するにはポイントが必要です。\n\nトリックを行ったり、フロアを達成したりすればポイントを入手できます。\nアップグレードを使用して、もっとポイントを獲得しましょう！"
      '9': "究極アップグレードを使用すれば、サクサク進めることができます。\n\n離れたフロアを達成して、ターミナルとアクセスしましょう。アップグレードキットを使用して、もっと究極アップグレードを見つけてみましょう。"
      '10': "アップグレードをレベルアップしましょう！\n\nアップグレードの研究を重ねて、パワーを上昇させましょう。"
      '11': "クローンはそれぞれ新規装備で開始し、ランクをはじめから獲得しなければなりません。"
    ToBeContinued:
