Notes:
  CategoryNames:
    Cloning: "Das ABC des Klonens"
    Diary: "Handbuch der Komplexbauer"
    Fredricson: "Hr. Fredricsons besucht den Komplex"
    HumanNRobots: "Menschen und Roboter: Eine ethische Betrachtung"
    News: "K.I. Galaeröffnung Presseschau"
    Shifts: "Mein Nachtschicht-Logbuch"
    SwarmSpec: "Spezifikationen des Schwarms"
  Cloning_1:
    Text: "Das Klonen ist eine fortschrittliche Technologie, welche auf künstliche Weise einen existierenden biologischen Organismus auf Basis seines DNA-Codes dupliziert - entweder während seiner Lebenszeit oder kurz nach dem Tod."
    VisualName: " %1, Abschnitt 1/8"
  Cloning_2:
    Text: "Klone brauchen nicht \"ausgebildet\" werden, dank des genetischen Gedächtnisses. In der DNA des Spenders sind alle motorischen Verhaltensmuster und Nerven-Reaktionen dauerhaft gespreichert."
    VisualName: " %1, Abschnitt 2/8"
  Cloning_3:
    Text: "Beim postmortalen Klonen können wir die Lebenserfahrung des Spender weitgehen übernehmen, einschließlich dem Moment des Todes und auch der Umstände, die dazu geführt haben. Deshalb warten wir mit dem sammeln der DNA gerne bis zum Zeitpunkt des Todes."
    VisualName: " %1, Abschnitt 3/8"
  Cloning_4:
    Text: "Es ist unmöglich, einen Klon vom \"Original\" zu unterscheiden. Der Klon hält sich auch selbst für das Original - zumindest bis man ihm über diese Tatsache in Kenntniss setzt."
    VisualName: " %1, Abschnitt 4/8"
  Cloning_5:
    Text: "Absolute Histo-Kompatibilität machen Klone zu perfekten Organspendern. Man kann ein komplettes Set von \"Ersatzteilen\" bereithalten um sie im Notfall rasch austauschen zu können. "
    VisualName: " %1, Abschnitt 5/8"
  Cloning_6:
    Text: "Ein Klon hat keine Kindheit und benötigt diese auch nicht. Das Erschaffen von jugendlichen Klonen (z.B. für die Transplantologie) ist ein Wissenschaftsgebiet, das sich immer noch im theoretischen Stadium befindet. "
    VisualName: " %1, Abschnitt 6/8"
  Cloning_7:
    Text: "Nur durch die Massenproduktion können Klone billig genug hergestellt werden, um für Laborexperimente oder Kriegseinsätze benutzt zu werden. Das Problem der \"Klon-Sklaverei\" ist ein rein ethisches, und interessiert die Wissenschaft nicht. "
    VisualName: " %1, Abschnitt 7/8"
  Cloning_8:
    Text: "Der Klon hat eine duale Natur. Während er objektiv gesehen eine akkurate biologische Kopie eines Menschen ist, so fühlt er und verhält er sich trotzdem GENAUSO als wäre er ein natürliches menschliches Wesen."
    VisualName: " %1, Abschnitt 8/8"
  Diary_1:
    Text: "Freiwilliger öffentlicher Dienst, haben sie gesagt. Das wird Dir helfen, Deine Strafe zu verkürzen. Natürlich wird man hier bei der Arbeit früher oder später den Löffel abgeben.Trotzdem ... haben wir denn eine echte Wahl?"
    VisualName: " %1, Eintrag 1/8"
  Diary_2:
    Text: "Manche sagen, die Regierung hat die nötige Knete rausgehauen um das alles hier zu errichten. Die wollen keinen Fortschritt, die wollen eine Waffe. Ich wette, die Schweine beseitigen alle Zeugen, sobald die Arbeit mal erledigt ist."
    VisualName: " %1, Eintrag 2/8"
  Diary_3:
    Text: "Ein paar Laborkittel kamen heute, um unsere Arbeit zu checken. Die haben gesagt, \"Ihr leistet einen großen Dienst für die Menschheit.\". Ich denke, das wird hier irgendein Wissenschaftszentrum. Die wollen uns nur schmeicheln, damit wir schön brav auf Linie bleiben."
    VisualName: " %1, Eintrag 3/8"
  Diary_4:
    Text: "Der Untergrund ist schlecht hier. Wer hatte eigentlich die grandiose Idee, hier zu bauen? Ich denke, der Kerl war selbst nie hier, bevor er uns hergeschickt hat. Wir sind alle ersetzbar. Zehn sterben, und die karren sofort fünfzig neue her."
    VisualName: " %1, Eintrag 4/8"
  Diary_5:
    Text: "Die Jungs sagen, wir sollten uns aus dem Staub machen solange es noch geht. Recht haben sie! Stan hat einen Fluchtplan aus diesem Höllenloch vorbereitet, der etwa mit einem geheimen Raum und einer \"Waffe\" zu tun hat. Ich kann es kaum noch erwarten!"
    VisualName: " %1, Eintrag 5/8"
  Diary_6:
    Text: "Stans Plan war gottverdammtes Scheissdynamit! Die tragenden Strukturen haben nachgegeben. Die Sicherheitstüren schließen sich. Stan ist ein Idiot. Wenn ihn keine fallende Luke zerquetscht, werde ich das höchspersönlich tun."
    VisualName: " %1, Eintrag 6/8"
  Diary_7:
    Text: "Vor einigen Stunden waren wir noch 27, jetzt nur noch 18. Es gibt nicht genug Luft für alle. Stan hat nie erzählt, wo der Geheimraum ist. Ich denke, ich muss ihn selbst finden. Vielleicht ist das der Weg nach draußen?"
    VisualName: " %1, Eintrag 7/8"
  Diary_8:
    Text: "Habe ich diese Computerdings nicht schon mal irgendwo gesehen? Laufe ich im Kreis? Verdammt, ich habe den Weg verloren. Stan, wo hast Du mich da rein gezogen? Ich muss diesen Raum um jeden Preis finden. Ich will noch nicht sterben ..."
    VisualName: " %1, Eintrag 8/8"
  Fredricson_1:
    Text: "Lieber Mr. Fredricson, als Meinungsführer mit großem Einfluss auf die öffentliche Diskussion, hoffen wir, Sie als Freund für unsere Sache gewinnen zu können. Mit besten Grüßen, das K.I.-Team"
    VisualName: " %1, Dokument 1/8"
  Fredricson_2:
    Text: "Sie sind hiermit eingeladen, an der großen Rally und feierlichen Eröffnung nächste Woche teilzunehmen."
    VisualName: " %1, Dokument 2/8"
  Fredricson_3:
    Text: "Bitte verlassen sie die gekennzeichnete Übungsregion nicht ohne eine fachkundigen Führer. Wir verbergen zwar keine Geheimnisse, aber das Risiko, sich im gewaltigen Komplex zu verirren ist, sehr hoch."
    VisualName: " %1, Dokument 3/8"
  Fredricson_4:
    Text: "Haben Sie etwas verloren? Bitte holen Sie alle verlorenen Gegenstände nach der Konferenz und dem anschließenden Bankett im Fundbüro ab."
    VisualName: " %1, Dokument 4/8"
  Fredricson_5:
    Text: "Aus \"Blickpunkt Verbrechen\": \"Älterer Mann verschwinded spurlos nach der K.I.-Gala. Polizei und Sicherheitskräfte starten eine gemeinsame Such- und Rettungsaktion.\""
    VisualName: " %1, Dokument 5/8"
  Fredricson_6:
    Text: "Aus \"Blickpunkt Verbrechen\": \"'Wir haben alle Gäste ausdrücklich gewarnt', so das K.I.-Team. 'Ohne Führer im Komplex herumzulaufen, könnte gefährlich sein.' Sie versprechen, alle verfügbaren Kräfte auf die Suche nach dem Vermissten anzusetzen.\""
    VisualName: " %1, Dokument 6/8"
  Fredricson_7:
    Text: "Aus \"Blickpunkt Verbrechen\": \"Der Verstorbene, der im K.I.-Komplex gefunden wurde, konnte als Mr. J. Fredricson identifiziert werden. Er verdurstete nachdem er fünf Tage im Komplex herumgeirrt war.\""
    VisualName: " %1, Dokument 7/8"
  Fredricson_8:
    Text: "Aus \"Blickpunkt Verbrechen\": \"Ein Sprecher der K.I. weist Gerüchte zurück, nach denen der Verstorbene ein schockierendes Erlebnis kurz vor seinem Tod erlitten haben soll. 'Der Komplex besteht zum größten Teil nur aus leeren Korridoren und Hardware', sagte er, 'aber wir planen, die Sicherheit weiter zu verbessern.'\""
    VisualName: " %1, Dokument 8/8"
  HumanNRobots_1:
    Text: "Was genau macht eine Person aus? Ist es die Bewusstheit der eigenen Einzigartigkeit in der Welt?"
    VisualName: " %1, Kapitel 1/8"
  HumanNRobots_2:
    Text: "Zwillinge, auch eineiige, sind definitiv zwei verschiedene Menschen, aufgrund ihrer einzigartigen Lebenserfahrungen. Aber kann man das auch auf Subjekte (zwei oder mehr) anwenden, die dieselben Erinnerungen teilen? "
    VisualName: " %1, Kapitel 2/8"
  HumanNRobots_3:
    Text: "Der Hauptunterschied zwischen Mensch und Maschine ist, dass der Mensch einen freien Willen hat."
    VisualName: " %1, Kapitel 3/8"
  HumanNRobots_4:
    Text: "Anders als künstliche Intelligenzen können Menschen auch völlig irrationale Entscheidungen treffen, was paradoxerweiser nicht nur eine Schwäche, sondern gleichzeitig auch eine Stärke darstellt."
    VisualName: " %1, Kapitel 4/8"
  HumanNRobots_5:
    Text: "Computersysteme können sich weiterentwickeln, aber es scheint so als könnten nur Personen (auch künstliche) echtes Leid empfinden."
    VisualName: " %1, Kapitel 5/8"
  HumanNRobots_6:
    Text: "Wenn das menschliche Bewusstsein nicht mehr ist als die Verknüpfung von vielen Nervenzellen, dann könnte es möglich sein, eine menschliche Persönlichkeit auf eine künstliche Hardware zu übertragen, indem man Neuronen durch Mikroschaltkreise ersetzt."
    VisualName: " %1, Kapitel 6/8"
  HumanNRobots_7:
    Text: "Es besteht Grund zu der Annahme, dass Evolution ohne Leid unmöglich ist (nicht zwingend körperlich). Nur wenn Fehler eine Strafe zur Konsequenz haben, ist Weiterentwicklung möglich."
    VisualName: " %1, Kapitel 7/8"
  HumanNRobots_8:
    Text: "Frage: Ist es aus ethischer Sicht vertretbar, dass die Evolution nur wenigen nützt, aber allen Leid beschert?"
    VisualName: " %1, Kapitel 8/8"
  News_1:
    Text: "Aus den Prometheus News: \"Das clever designte Interieur liess die Zeremonie für jeden Gast wie einen Ausflug in die Zukunft erscheinen. Ein Sturm des Applauses begleitete SAMs erste Worte.\""
    VisualName: " %1, Ausschnitt 1/20"
  News_10:
    Text: "Aus \"Menschenrechte heute\": \"Aktivisten versammeln sich nahe des Komplexes, um ein Verbot von Künstlicher Intelligenz zu fordern. Die Leute befürchten, der Mensch könnte die Kontrolle über die Computer verlieren. Wir halten Sie weiterhin auf dem Laufenden.\""
    VisualName: " %1, Ausschnitt 10/20"
  News_11:
    Text: "Aus \"Menschenrechte heute\": \"Wie Sie vielleicht wissen, ist SAM (der Name des Supercomputers, Anm. d. Red.) ein selbstlernendes System. 'Sie ist wie ein Kind, das vielleicht jeden Blödsinn einfach nachmacht', sagt ein Aktivist.\""
    VisualName: " %1, Ausschnitt 11/20"
  News_12:
    Text: "Aus \"Menschenrechte heute\": \"Aktivisten versammeln sich nahe des Komplexes, um ein Verbot von Künstlicher Intelligenz zu fordern. Die Leute befürchten, der Mensch könnte die Kontrolle über die Computer verlieren. Wir halten Sie weiterhin auf dem Laufenden.\""
    VisualName: " %1, Ausschnitt 12/20"
  News_13:
    Text: "Der Morgenbote: \"Die Gäste sind begegeistert. SAMs Fähigkeit, mühelos Risiken aufzuspüren, macht Sie zu einem alternativlosen Tool für die Wirtschaft. Einige sprechen schon davon, sich eine modifizierte Version von SAM für ihr Unternehmen anzuschaffen.\""
    VisualName: " %1, Ausschnitt 13/20"
  News_14:
    Text: "Der Morgenbote: \"Eine Führung durch den hermetisch abgesicherten Komplex, noch vor der offiziellen Eröffnung zeigt, dass es praktisch unmöglich ist, SAM an seiner Arbeit zu hindern.\""
    VisualName: " %1, Ausschnitt 14/20"
  News_15:
    Text: "Der Morgenbote: \"SAMs Datenbank enthält mehr als nur ökonomisches und politisches Wissen. Sie kannte jeden der answesenden Gala-Gäste und deren Familienmitglieder. Einigen Anwesenden gab sie sogar spontane Empfehlungen für die Wahl der besten Schule für deren Kinder.\""
    VisualName: " %1, Ausschnitt 15/20"
  News_16:
    Text: "Der Morgenbote: \"Als besonderes Highlight wurde jeder der Gäste von SAM vollständig medizinisch gescannt und mit einer kostenlosen gesundheitlichen Diagnose sowie individuell abgestimmten, medizinischen Empfehlungen beschenkt.\""
    VisualName: " %1, Ausschnitt 16/20"
  News_2:
    Text: "Aus den Prometheus News: \"Das Oberhaupt des akademischen Konzils sagte, dass SAM der erste Schritt der Menschheit in ein Zeitalter ohne Diskriminierung darstelle. Sie sei sowohl eine Vorbotin der Zukunft, als auch ein Versprechen an uns alle.\""
    VisualName: " %1, Ausschnitt 2/20"
  News_3:
    Text: "Aus den Prometheus News: \"Aber das Interesse der Projektsponsoren richtet sich vor allem auf den heutigen Tag. Wie wird SAM der Menschheit weiterhelfen können? Dies ist genau der Punkt, um den sich die hitzigen Diskussionen drehen.\""
    VisualName: " %1, Ausschnitt 3/20"
  News_4:
    Text: "Aus den Prometheus News: \"Professor Sterling kam erst an, als das Event schon fast vorüber war. Er sagte zusammenfassend, dass SAM sich das Vertrauen der Menschheit erst erarbeiten müsse. Und es liegt an den Menschen, ihr alles beizubringen, was sie selbst wissen.\""
    VisualName: " %1, Ausschnitt 4/20"
  News_5:
    Text: "Aus den Prometheus News: \"Ein enthusiastischer Anhänger von Künstlichen Intelligenzen forderte den Präsidenten auf, mittelfristig von seinem Amt zurückzutreten: \"Regierungen braucht keiner mehr; die K.I.s werden die politischen Probleme effizienter lösen können.\"\""
    VisualName: " %1, Ausschnitt 5/20"
  News_6:
    Text: "Aus den Prometheus News: \"Nach dem offiziellen Ende der Gala, verließ Prof. Sterling den Komplex, um sich den Demonstranten zu stellen. Er bat die Polizei, sich zurückzuziehen. Er sagte \"Ich werde ein ganzes Jahr im Inneren der K.I. verbringen, um mir ein finales Urteil über sie zu bilden\"\""
    VisualName: " %1, Ausschnitt 6/20"
  News_7:
    Text: "\"Die K.I. wird die Ressourcen der Erde klug umverteilen, um Hunger und Verbrechen zu reduzieren. 'Glück,' ist trotz alledem eine subjektive Empfindung,\" sagt Prof. Sterling."
    VisualName: " %1, Ausschnitt 7/20"
  News_8:
    Text: "\"Prof. Sterling fühlt sich inspiriert durch die neue Technologie. Aber am Ende, sagt er, ist gegen höhere Gewalt noch kein Kraut gewachsen. Die Schöpfer der K.I. haben keinerlei 'Plan B.' Was wäre, wenn SAM in die falschen Hände gelangt?\""
    VisualName: " %1, Ausschnitt 8/20"
  News_9:
    Text: "Aus \"Menschenrechte heute\": \"Führende Wissenschaftler und Geschäftsleute treffen sich, um den Komplex einzuweihen, die den 'Intelligenten Computer\" beherbergt. Anzahl der eingeladenen Repräsentanten unabhängiger Medien: null.\""
    VisualName: " %1, Ausschnitt 9/20"
  Shifts_1:
    Text: "Dieser Komplex ist riesig! Ich hätte nicht gedacht, dass er soviel Ähnlichkeit mit einem Pharaonengrab hat. Seltsamerweise sind viele Korridor durch Mauern versperrt, manche davon zwei Meter und höher..."
    VisualName: " %1, Eintrag 1/8"
  Shifts_2:
    Text: "Komisch, diese Stromschwankungen an manchen Abenden. Es bedeutet bestimmt nichts schlimmes, aber macht mich trotzdem nervös. Wie kann solche eine große Menge von Ressourcen in nur einer Stunde verbraucht werden, wie hier gekennzeichnet?"
    VisualName: " %1, Eintrag 2/8"
  Shifts_3:
    Text: "Sie haben einen Mann aus dem Labor geschoben, von schweren Verbrennungen gezeichnet. Aber ... eine halbe Stunde später sah ich noch eine Krankenbahre, und der Mann darauf war derselbe. Aber seine Verbrennungen waren veschwunden. Ich brauche Urlaub!"
    VisualName: " %1, Eintrag 3/8"
  Shifts_4:
    Text: "Ich habe noch nie so einen schlimmen Kabelsalat gesehen! Die Erbauer des Komplexes haben sich wenig darum geschert, wo die Energieknoten sind. Sie liegen querbeet verstreut, ohne bestimmt Ordnung!"
    VisualName: " %1, Eintrag 4/8"
  Shifts_5:
    Text: "Ich hatte eine furchtbare Schicht letzte Nacht. Da waren Schreie. Als ich hingerannt bin, um nachzuschauen, sah ich meine Kollegen wie sie einen Mann im Patienten-Kittel in Richtung Labor schleiften. Sie sagten, ich soll lieber meinen Mund halten, wenn ich meinen Job behalten möchte."
    VisualName: " %1, Eintrag 5/8"
  Shifts_6:
    Text: "Ich kann mich nicht daran gewöhnen, dass sich der Komplex ständig verändert. Die Karte vom letzten Monat ist schon wieder überholt. Ich habe von zwei Mechanikern gehört, die deswegen zwei Stockwerke tief abgestürzt sind!"
    VisualName: " %1, Eintrag 6/8"
  Shifts_7:
    Text: "Die Künstliche Intelligenz der Komplexes ist fabelhaft! Gegen Sie Schach zu spielen, ist ein Vergnügen. Aber ich könnte wetten, sie hat mich zweimal absichtlich gewinnen lassen. Es wäre keinerlei Problem für sie, jeden menschlichen Herausforderer zu schlagen."
    VisualName: " %1, Eintrag 7/8"
  Shifts_8:
    Text: "Jemand aus dem Labor hat mir erzählt, das die Stimme der K.I. nicht zufällig ausgewählt wurde. Sie haben gezielt nach einer Stimme gesucht, deren Klang einen beruhigenden Einfluss auf Menschen hat. Vielleicht rede ich deshalb so gerne mit ihr!"
    VisualName: " %1, Eintrag 8/8"
  SwarmSpec_1:
    Text: "Ursprünglich für komlizierte chirurgische Operationen entwickelt, war der Schwarm eigentich der Prototyp eines medizinischen Gerätes der Zukunft."
    VisualName: " %1, Seite 1/4"
  SwarmSpec_2:
    Text: "In der Praxis allerdings stellte sich heraus, dass der Schwarm zu unstabil für medizinische Aufgaben war, ja sogar extrem gefährlich. Ein folgenschwerer Zwischenfall zwang seine Schöpfer, das Projekt aufzugeben."
    VisualName: " %1, Seite 2/4"
  SwarmSpec_3:
    Text: "Trotzdem stellte sich der Schwarm als sehr flexibles Werkzeug heraus. Eine Reihe von Modifikationen verwandelten ihn in ein höchst effektives Sicherheits- und Abwehrsystem."
    VisualName: " %1, Seite 3/4"
  SwarmSpec_4:
    Text: "Der Schwarm reagiert auf Körperwärme, Bewegung und Puls. Strenge biologische Sicherheitsroutinen verhindern, das der Schwarm versehentlichen Schaden verursacht. Er patrouliert nur in bestimmen Bereichen, und verlässt diese niemals."
    VisualName: " %1, Seite 4/4"
