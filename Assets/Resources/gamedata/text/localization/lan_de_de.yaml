      '5': "Folge einer ausgeklügelten Strategie um dein Ziel zu erreichen!\n\nWechsle Upgrades an der Versorgungsstation aus um genau das zu erhalten was du brauchst für den perfekten Lauf."
      '6': "Manche Upgrades verstärken einander!\n\nVersuche \"Feinmechanismus\" und \"Erweiterte Analyse\" zusammen zu nutzen."
