      '8': "Du brauchst Punkte um Ränge zu erhalten.\n\nDu erhältst Punkte indem du Tricks ausführst und Ebenen durchspielst.\nErhalte mehr Punkte durch Upgrades!"
      '9': "Ultimative Upgrades können dich unaufhaltbar machen.\n\nSchaffe abgelegene Ebenen um Zugang zu ihnen am Terminal zu erhalten. Nutze Upgrade-Kits um noch mehr ultimative Upgrades zu finden."
      '10': "Bessere deine Upgrades auf!\n\nErforsche jedes Upgrade mehrmals um seine Leistung zu verbessern."
      '11': "Jeder Klon startet mit neuer Ausrüstung und muss sich Ränge von neuem verdienen."
