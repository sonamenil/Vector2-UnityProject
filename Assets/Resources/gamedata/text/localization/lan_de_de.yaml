      '1': "Um einen höheren Rang zu erreichen, halte Ausschau nach Upgrades die dir mehr Punkte geben."
      '2': "Für manche Aktionen benötigst du Datenchips.\nBenutze den Chipdetektor um sie zu finden oder kaufe Datenchip-Pakete um Zeit zu sparen."
