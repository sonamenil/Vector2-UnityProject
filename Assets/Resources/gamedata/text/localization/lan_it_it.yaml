Notes:
  CategoryNames:
    Cloning: "L'ABC della clonazione"
    Diary: "Diario di un costruttore della struttura"
    Fredricson: "Il signor Fredricson visita la struttura"
    HumanNRobots: "Uomini e robot: un esame etico"
    News: "Rassegna stampa dell'inaugurazione dell'I.A."
    Shifts: "Il diario dei miei turni di notte"
    SwarmSpec: "Specifiche di SCIAME"
  Cloning_1:
    Text: "La clonazione è una tecnologia avanzata che ricrea artificialmente un organismo biologico esistente basandosi sul suo codice genetico, o DNA, preso in un qualsiasi momento della sua vita o appena dopo la sua morte."
    VisualName: " %1, sezione 1/8"
  Cloning_2:
    Text: "Grazie alla memoria genetica, i cloni non hanno bisogno di essere istruiti. Il DNA del donatore conserva tutte le sue reazioni nervose e sequenze motorie abituali."
    VisualName: " %1, sezione 2/8"
  Cloning_3:
    Text: "Utilizzando campioni di DNA estratti durante l'autopsia è possibile usufruire di tutta l'esperienza accumulata dal donatore nel corso della sua vita, incluso il momento della morte e le sue cause. Per questo motivo, in genere si preferisce utilizzare campioni raccolti appena dopo la morte del soggetto."
    VisualName: " %1, sezione 3/8"
  Cloning_4:
    Text: "È impossibile distinguere un clone dall'originale, cioè dall'essere umano che ha fornito il DNA utilizzato per crearlo. Di norma il clone stesso riterrà di essere l'originale, a meno che non gli venga detta la verità."
    VisualName: " %1, sezione 4/8"
  Cloning_5:
    Text: "La perfetta istocompatibilità rende la clonazione una tecnologia ideale per i trapianti. In caso di necessità è possibile ottenere svariati set di arti e organi \"di riserva\" con cui sostituire i propri."
    VisualName: " %1, sezione 5/8"
  Cloning_6:
    Text: "Un clone non ha un'infanzia, né ne ha bisogno. Nasce già sotto forma di organismo maturo. La creazione di cloni di giovane età (per esempio, per trapianti pediatrici o altri scopi) è ancora in via di sviluppo teorico."
    VisualName: " %1, sezione 6/8"
  Cloning_7:
    Text: "Solo la produzione di massa potrebbe ridurre il costo dei cloni a sufficienza da permettere il loro utilizzo per il lavoro manuale o il servizio militare. La \"schiavitù dei cloni\" resta un problema etico che dev'essere risolto dalla società, non dalla scienza."
    VisualName: " %1, sezione 7/8"
  Cloning_8:
    Text: "La natura di un clone è duale. Mentre oggettivamente è solo una copia biologicamente precisa di un essere umano, soggettivamente si sente e si comporta COME SE fosse un normale essere umano."
    VisualName: " %1, sezione 8/8"
  Diary_1:
    Text: "\"Servizi per la comunità\", hanno detto. \"Vi aiuterà a ridurre il periodo di detenzione\", sostenevano. Avevano ragione, lavorando qui si tirano le cuoia molto prima. Anche se… eravamo davvero liberi di scegliere?"
    VisualName: " %1, annotazione 1/8"
  Diary_2:
    Text: "Alcuni sostengono che sia stato il governo a mettere i soldi per questa costruzione. Vogliono armi, non progresso. Scommetto che appena avranno finito faranno piazza pulita di tutti noi, siamo testimoni scomodi."
    VisualName: " %1, annotazione 2/8"
  Diary_3:
    Text: "Oggi sono venuti degli scienziati a controllare il nostro lavoro. Continuavano a dire: \"State svolgendo un grande servizio per l'umanità\". Scommetto che questo posto diventerà una specie di centro di ricerca. Penso che ci stiano solo blandendo per tenerci buoni."
    VisualName: " %1, annotazione 3/8"
  Diary_4:
    Text: "Il terreno è un disastro. Chi ha avuto la brillante idea di costruire qui? Scommetto che non hanno mai guardato com'era sottoterra prima di mandarci qui sotto. Ora so perché volevano dei detenuti: siamo facili da sostituire. Ne muoiono dieci? Eccone altri cinquanta."
    VisualName: " %1, annotazione 4/8"
  Diary_5:
    Text: "I miei compagni credono che sia ora di fuggire di qui finché siamo in tempo. Non posso che concordare. Stan ha un piano per portarci fuori da questo buco infernale che si basa su una stanza segreta e una specie di \"arma\". Non vedo l'ora!"
    VisualName: " %1, annotazione 5/8"
  Diary_6:
    Text: "Il piano di Stan era… dinamite pura! Le strutture portanti hanno ceduto! Le entrate si stanno chiudendo e noi siamo bloccati qui sotto! Stan è un idiota fortunato. Se non lo avesse ucciso una trave, l'avrei strangolato io stesso per aver causato questo casino!"
    VisualName: " %1, annotazione 6/8"
  Diary_7:
    Text: "Un'ora fa eravamo in 27, ora siamo rimasti solo in 18. Non ci sarà aria a sufficienza per tutti. Dobbiamo prendere una decisione. Stan non ha mai detto dov'era la sua stanza segreta. Suppongo che dovrò trovarla. Forse da lì c'è una via d'uscita?"
    VisualName: " %1, annotazione 7/8"
  Diary_8:
    Text: "Non l'ho già visto questo computer, prima? Sto girando in tondo? Dannazione, mi sono perso! Stan, in che pasticcio mi hai cacciato? Devo trovare quella stanza a tutti i costi. Non voglio morire qui…"
    VisualName: " %1, annotazione 8/8"
  Fredricson_1:
    Text: "Caro signor Fredricson, in qualità di leader di opinione fortemente coinvolto nella discussione pubblica a riguardo, speriamo di riuscire a farla diventare un sostenitore della nostra causa. Cordiali saluti, il team di sviluppo dell'I.A."
    VisualName: " %1, documento 1/8"
  Fredricson_2:
    Text: "La invitiamo a partecipare al grande raduno e all'inaugurazione dell'intelligenza artificiale della settimana prossima."
    VisualName: " %1, documento 2/8"
  Fredricson_3:
    Text: "Si pregano gli ospiti di non allontanarsi dall'area riservata a loro senza una guida. Non abbiamo nulla da nascondere, ma non vorremmo che qualcuno si perdesse nell'immenso labirinto di corridoi della struttura."
    VisualName: " %1, documento 3/8"
  Fredricson_4:
    Text: "Avete smarrito qualcosa? Siete invitati a recuperare tutti gli oggetti smarriti nel corso della conferenza e del banchetto all'ufficio oggetti smarriti."
    VisualName: " %1, documento 4/8"
  Fredricson_5:
    Text: "Crime & Accidents: \"Un uomo anziano è scomparso al termine dell'inaugurazione dell'I.A.; la polizia e i servizi di sicurezza della struttura hanno lanciato una operazione di ricerca e soccorso congiunta.\""
    VisualName: " %1, documento 5/8"
  Fredricson_6:
    Text: "Crime & Accidents: \"Il team di sviluppo dell'I.A. ha dichiarato: «Abbiamo avvertito tutti gli ospiti che vagare per la struttura senza accompagnatori avrebbe potuto essere pericoloso» e ha promesso che avrebbe fatto tutto il possibile per trovare l'uomo scomparso.\""
    VisualName: " %1, documento 6/8"
  Fredricson_7:
    Text: "Crime & Accidents: \"Nella struttura dell'I.A. è stato rinvenuto un cadavere, identificato come il signor J. Fredricson. Pare che sia morto di disidratazione dopo aver vagato per cinque giorni nell'enorme struttura.\""
    VisualName: " %1, documento 7/8"
  Fredricson_8:
    Text: "Crime & Accidents: \"Un portavoce della struttura ha negato che il defunto abbia affrontato pericoli indicibili prima della sua morte: «La struttura è per la maggior parte formata da corridoi vuoti pieni di hardware, ma abbiamo intenzione di rafforzare le nostre misure di sicurezza».\""
    VisualName: " %1, documento 8/8"
  HumanNRobots_1:
    Text: "Cosa rende unica una persona? La consapevolezza di sé unita all'unicità della propria esistenza?"
    VisualName: " %1, capitolo 1/8"
  HumanNRobots_2:
    Text: "I gemelli, anche quelli geneticamente identici, sono due persone distinte perché hanno diverse esperienze di vita. Lo stesso continuerà a essere vero per soggetti (due o più) che condividono anche le stesse esperienze?"
    VisualName: " %1, capitolo 2/8"
  HumanNRobots_3:
    Text: "La differenza principale fra gli esseri umani e i computer è il libero arbitrio."
    VisualName: " %1, capitolo 3/8"
  HumanNRobots_4:
    Text: "Al contrario degli intelletti artificiali, gli esseri umani sono in grado di fare scelte completamente irrazionali. Questa, paradossalmente, è sia la loro debolezza che la loro forza."
    VisualName: " %1, capitolo 4/8"
  HumanNRobots_5:
    Text: "I computer sono in grado di evolvere, ma sembra che solo gli esseri umani (compresi quelli artificiali) possano soffrire."
    VisualName: " %1, capitolo 5/8"
  HumanNRobots_6:
    Text: "Se la coscienza umana è solo l'interconnessione delle cellule nervose del cervello, potrebbe essere possibile trasferire un essere umano in un hardware artificiale, sostituendo i neuroni con dei microcircuiti."
    VisualName: " %1, capitolo 6/8"
  HumanNRobots_7:
    Text: "Alcuni sostengono che l'evoluzione sia possibile solo attraverso la sofferenza (non necessariamente fisica). Per esempio, non sarebbe possibile imparare per mezzo delle proprie esperienze senza soffrire per i propri errori."
    VisualName: " %1, capitolo 7/8"
  HumanNRobots_8:
    Text: "Domanda: da un punto di vista etico, è giustificata la promessa dell'evoluzione per pochi al prezzo della sofferenza di tutti?"
    VisualName: " %1, capitolo 8/8"
  News_1:
    Text: "The Prometheus News: \"Grazie agli interni progettati ad arte, a ogni ospite della cerimonia di inaugurazione è sembrato di trovarsi già nel futuro. Un mare di applausi ha accolto le prime parole di SAM.\""
    VisualName: " %1, frammento 1/20"
  News_10:
    Text: "Man and His Right Daily: \"I contestatori si sono riuniti nei pressi della struttura, chiedendo la messa al bando dell'intelligenza artificiale. Temono che gli uomini possano perdere il controllo del computer. Vi terremo al corrente sulla situazione.\""
    VisualName: " %1, frammento 10/20"
  News_11:
    Text: "Man and His Right Daily: \"Come probabilmente sapete, SAM (il nome del supercomputer, N.d.R.) è un sistema in grado di apprendere automaticamente. Nelle parole di un dimostrante: «È come un bambino a cui qualcuno può dare il cattivo esempio».\""
    VisualName: " %1, frammento 11/20"
  News_12:
    Text: "Man and His Right Daily: \"Finalmente il professor Sterling è arrivato alla cerimonia di inaugurazione. La folla, fra cui sono presenti molti dei suoi studenti, lo ha accolto con un'ovazione. Sarà il professor Sterling l'insegnante di SAM?\""
    VisualName: " %1, frammento 12/20"
  News_13:
    Text: "Tomorrow's Herald: \"Gli ospiti sono entusiasti. L'abilità di SAM di calcolare i rischi all'istante la rende uno strumento di capitale importanza per l'economia. Alcuni stanno discutendo la possibilità di acquistare una versione modificata di SAM per utilizzarla nelle loro imprese.\""
    VisualName: " %1, frammento 13/20"
  News_14:
    Text: "Tomorrow's Herald: \"Una visita guidata della struttura prima dell'inizio ufficiale dell'evento, pur senza svelare tutti i suoi segreti, ha dimostrato che non è possibile interferire in alcun modo nelle operazioni di SAM.\""
    VisualName: " %1, frammento 14/20"
  News_15:
    Text: "Tomorrow's Herald: \"Il database di SAM non si limita a conoscenze economiche e politiche. SAM Conosce ogni ospite della cerimonia di inaugurazione e i membri della sua famiglia. Consultando le statistiche, ha persino aiutato alcuni di loro a scegliere la scuola migliore per i loro figli.\""
    VisualName: " %1, frammento 15/20"
  News_16:
    Text: "Tomorrow's Herald: \"Come regalo, ogni ospite è stato scansionato da SAM e ha ricevuto un dettagliato referto medico. Alcuni non sono stati particolarmente felici dei risultati, ma questi sono stati accompagnati da consigli sulla salute.\""
    VisualName: " %1, frammento 16/20"
  News_2:
    Text: "The Prometheus News: \"Il presidente del consiglio accademico ha definito SAM come «i primi timidi passi dell'umanità in un mondo senza discriminazioni sociali». È al contempo un araldo del futuro e un segno profetico di quello che ci attende.\""
    VisualName: " %1, frammento 2/20"
  News_3:
    Text: "The Prometheus News: \"Ma gli interessi dei sostenitori del progetto risiedono nel presente, non nel futuro. Come potrà SAM essere utile già oggi all'umanità? Un interrogativo su cui si sta discutendo animatamente.\""
    VisualName: " %1, frammento 3/20"
  News_4:
    Text: "The Prometheus News: \"Il professor Sterling è arrivato quasi al termine dell'evento. Ha ripetuto che SAM deve ancora ottenere la fiducia dell'umanità. Starà agli uomini insegnarle tutte le loro conoscenze.\""
    VisualName: " %1, frammento 4/20"
  News_5:
    Text: "The Prometheus News: \"Un sostenitore entusiastico dell'I.A. ha invitato il presidente a dimettersi prima dello scadere del suo mandato: «Non abbiamo più bisogno di un governo: l'I.A. risolverà i nostri problemi con maggiore efficienza».\""
    VisualName: " %1, frammento 5/20"
  News_6:
    Text: "The Prometheus News: \"Al termine della cerimonia di inaugurazione, il professor Sterling è uscito dalla struttura per incontrare i contestatori. Ha chiesto alla polizia di ritirarsi, dicendo: «Resterò per un anno all'interno dell'I.A. per maturare un giudizio finale su di essa».\""
    VisualName: " %1, frammento 6/20"
  News_7:
    Text: "\"«L'I.A. sarà in grado di ridistribuire le risorse della Terra in maniera più saggia, evitando carestie e malattie, e riducendo la criminalità. La felicità, però, è un concetto soggettivo» ha detto il professor Sterling.\""
    VisualName: " %1, frammento 7/20"
  News_8:
    Text: "\"Il professor Sterling si sente ispirato da questa nuova tecnologia, ma non ritiene di poter escludere uno scenario di forza maggiore. I creatori dell'I.A. non hanno un piano B. Cosa accadrebbe se SAM cadesse nelle mani sbagliate?\""
    VisualName: " %1, frammento 8/20"
  News_9:
    Text: "Man and His Right Daily: \"Gli scienziati e gli uomini d'affari più eminenti si sono incontrati per inaugurare la struttura che ospita questo «computer intellettuale». Nessun rappresentante della stampa libera è stato invitato alla cerimonia di inaugurazione.\""
    VisualName: " %1, frammento 9/20"
  Shifts_1:
    Text: "Questa struttura è enorme! Non me l'aspettavo, ma dall'interno sembra proprio la tomba di un faraone egizio. Stranamente, molti corridoi sono interrotti da pareti cieche alte un paio di metri…"
    VisualName: " %1, annotazione 1/8"
  Shifts_2:
    Text: "Certe sere si verificano strane oscillazioni di tensione. Non è nulla di grave, ma mi innervosisce. Com'è possibile che durante l'ora segnata con un trattino sul programma dei test venga utilizzata una tale mole di energia?"
    VisualName: " %1, annotazione 2/8"
  Shifts_3:
    Text: "Hanno portato fuori dal laboratorio un uomo gravemente ustionato, ma… mezz'ora dopo ho visto passare un'altra barella e avrei giurato che si trattasse della stessa persona. Però questa volta non aveva nessuna ustione! Ho bisogno di un giorno libero…"
    VisualName: " %1, annotazione 3/8"
  Shifts_4:
    Text: "In tutta la mia vita non ho mai visto un tale groviglio di fili! Chi ha costruito questa struttura non sembra aver fatto molto caso a dove posizionava gli snodi di corrente. Sono ovunque e sembrano essere disposti a casaccio!"
    VisualName: " %1, annotazione 4/8"
  Shifts_5:
    Text: "Il mio turno di ieri notte è stato molto snervante. Ho sentito delle grida. Quando sono accorso sul posto, ho visto che i miei colleghi stavano spingendo verso il laboratorio un tipo che indossava un camice da ospedale. Mi hanno detto di tenere la bocca chiusa, se ci tengo al mio lavoro…"
    VisualName: " %1, annotazione 5/8"
  Shifts_6:
    Text: "Non riesco ad abituarmi ai continui cambiamenti della struttura. Le mappe del mese scorso sono già obsolete. Ho sentito dire che alcuni tecnici sono caduti per ben due livelli!"
    VisualName: " %1, annotazione 6/8"
  Shifts_7:
    Text: "L'intelligenza artificiale della struttura è fantastica! È un piacere giocare a scacchi con lei. Scommetto che mi ha anche lasciato vincere di proposito un paio di volte. Ovviamente è in grado di sconfiggere un essere umano senza alcuna difficoltà."
    VisualName: " %1, annotazione 7/8"
  Shifts_8:
    Text: "Dei tipi del laboratorio mi hanno detto che la voce dell'I.A. non è stata scelta a caso. Volevano una voce che fosse in grado di infondere tranquillità. Ecco perché è così piacevole parlare con lei!"
    VisualName: " %1, annotazione 8/8"
  SwarmSpec_1:
    Text: "SCIAME venne progettato per eseguire interventi chirurgici complessi ed era un prototipo di quella che avrebbe dovuto essere l'attrezzatura medica del futuro."
    VisualName: " %1, pagina 1/4"
  SwarmSpec_2:
    Text: "All'atto pratico, però, si scoprì che SCIAME era troppo instabile per interventi di tipo medico ed estremamente pericoloso. Un incidente mortale costrinse i suoi creatori a terminare il progetto."
    VisualName: " %1, pagina 2/4"
  SwarmSpec_3:
    Text: "Però SCIAME si dimostrò estremamente adattabile e, grazie a una serie di modifiche, venne convertito da un prototipo medico a un affidabile sistema di sicurezza."
    VisualName: " %1, pagina 3/4"
  SwarmSpec_4:
    Text: "SCIAME risponde a calore corporeo, movimenti e battito cardiaco. I suoi bersagli vengono individuati per mezzo di parametri biologici rigorosi che rendono impossibili uccisioni accidentali. Pattuglia le aree designate senza mai allontanarsi."
    VisualName: " %1, pagina 4/4"
