Notes:
  CategoryNames:
    Cloning: "El ABC de la clonación"
    Diary: "Diario de un obrero del complejo"
    Fredricson: "Visita del señor Fredricson al complejo"
    HumanNRobots: "Humanos y robots: Un análisis ético"
    News: "Dosier de prensa: Gala inaugural de IA"
    Shifts: "Diario de mis turnos de noche"
    SwarmSpec: "Especificaciones de ENJAMBRE"
  Cloning_1:
    Text: "La clonación es una avanzada tecnología que recrea artificialmente un organismo biológico ya existente basándose en su código genético, o ADN, obtenido en cualquier momento de su vida o poco después de su muerte."
    VisualName: " %1, sección 1/8"
  Cloning_2:
    Text: "Gracias a la memoria genética, los clones no precisan recibir \"educación\". El ADN del donante conserva todas las secuencias motoras habituales del sujeto y sus reacciones nerviosas."
    VisualName: " %1, sección 2/8"
  Cloning_3:
    Text: "Usar muestras de ADN post mórtem en clonaciones nos permite aprovechar al máximo la experiencia vital del donante, incluido el propio momento de la muerte y sus motivos. Por lo tanto, es preferible esperar hasta justo después del fallecimiento para obtener las muestras."
    VisualName: " %1, sección 3/8"
  Cloning_4:
    Text: "Resulta imposible distinguir un clon del \"original\", es decir, del ser humano cuyo ADN se utilizó para crearlo. Con toda probabilidad, el clon creerá ser ese humano en concreto a menos que se le revele la verdad."
    VisualName: " %1, sección 4/8"
  Cloning_5:
    Text: "La histocompatibilidad absoluta hace de la clonación la tecnología ideal para el trasplante de órganos. Una persona puede contar con sets completos de órganos y extremidades \"de repuesto\" en caso de que necesite reemplazar los suyos."
    VisualName: " %1, sección 5/8"
  Cloning_6:
    Text: "Los clones no tienen \"infancia\" ni precisan de ella. Emergen del tanque como un organismo maduro. La creación de clones juveniles (p. ej. para trasplantes pediátricos u otros propósitos) se encuentra aún en la fase teórica de su desarrollo."
    VisualName: " %1, sección 6/8"
  Cloning_7:
    Text: "La producción en masa es el único método que abaratará los costes de la creación de clones destinados al trabajo manual o el servicio militar. La \"esclavitud de los clones\" es una cuestión ética que debe resolver la sociedad y no la ciencia."
    VisualName: " %1, sección 7/8"
  Cloning_8:
    Text: "La naturaleza del clon es dual. Mientras que, objetivamente, no es más que una copia biológicamente precisa de un humano, subjetivamente siente y se comporta COMO SI fuese un ser humano natural."
    VisualName: " %1, sección 8/8"
  Diary_1:
    Text: "Conque servicios a la comunidad, ¿eh? Te ayudará a reducir el tiempo en chirona, decían. Claro, ¡porque trabajando aquí la palmas antes! Bueno, ¿acaso nos dieron otra opción?"
    VisualName: " %1, entrada 1/8"
  Diary_2:
    Text: "Algunos dicen que el gobierno apoquinó el dinero para construir todo esto. Solo les interesa las armas, nada más; a la porra el progreso. Seguro que se 'deshacen' de nosotros, los testigos, cuando acabemos el trabajo."
    VisualName: " %1, entrada 2/8"
  Diary_3:
    Text: "Unos tíos en batas de laboratorio vinieron a vernos trabajar hoy. No paraban de decir: 'Están prestando un gran servicio a la humanidad'. Supongo que va a ser un centro científico o algo así. Lo que estaban haciendo era camelarnos para que nos comportemos, seguro."
    VisualName: " %1, entrada 3/8"
  Diary_4:
    Text: "El suelo es de mala calidad. ¿A quién se le ocurrió la genialidad de construir aquí? Seguro que ni se les ocurrió analizar el subsuelo antes de llamarnos. Ahora entiendo por qué querían reclusos: somos reemplazables. Si mueren diez, traen cincuenta más sin problema."
    VisualName: " %1, entrada 4/8"
  Diary_5:
    Text: "Hay compañeros que dicen que deberíamos salir de aquí mientras podamos, y la verdad es que no es mala idea. Stan tiene un plan para escapar de este agujero infernal: algo que ver con una sala secreta y un 'arma'. ¡Estoy deseándolo!"
    VisualName: " %1, entrada 5/8"
  Diary_6:
    Text: "¡El plan de Stan era dinamita, joder! ¡Las estructuras que soportaban el peso han cedido! Las puertas se están sellando, pero nosotros seguimos aquí. El idiota de Stan tiene suerte de que lo matara una viga al caer, ¡o lo estrangularía yo por armar este jaleo!"
    VisualName: " %1, entrada 6/8"
  Diary_7:
    Text: "Hace una hora éramos 27, y ahora, 18. No va a haber suficiente aire para todos. Tenemos que tomar una decisión. Stan no llegó a decir dónde estaba la sala secreta. Supongo que tendremos que buscarla. Tal vez podamos salir a través de ella."
    VisualName: " %1, entrada 7/8"
  Diary_8:
    Text: "¿No había visto antes este ordenador o lo que sea este cacharro? ¿Estoy andando en círculos, o qué? ¡Maldita sea, me he perdido! Stan, ¿en qué demonios me has metido? Tengo que encontrar esa sala como sea. No quiero morir aquí..."
    VisualName: " %1, entrada 8/8"
  Fredricson_1:
    Text: "Estimado señor Fredricson: Como líder de opinión que es, y debido a su importante papel en el debate público respecto a este tema, esperamos poder hacer de usted un nuevo aliado de nuestra causa. Atentamente, el equipo de IA."
    VisualName: " %1, documento 1/8"
  Fredricson_2:
    Text: "Por la presente, le invitamos a participar en el gran evento e inauguración de la inteligencia artificial que tendrá lugar la semana próxima."
    VisualName: " %1, documento 2/8"
  Fredricson_3:
    Text: "Le rogamos que no abandone la zona designada para invitados sin uno de nuestros guías. No tenemos secretos, pero se arriesgaría a perderse en los inmensos pasillos del complejo."
    VisualName: " %1, documento 3/8"
  Fredricson_4:
    Text: "Si pierde algo, puede reclamar cualquier objeto extraviado durante la conferencia y el banquete posterior en nuestra oficina de objetos perdidos."
    VisualName: " %1, documento 4/8"
  Fredricson_5:
    Text: "Crímenes y Accidentes: \"Un anciano desaparece tras la gala inaugural de la IA. La policía y el servicio de seguridad del complejo están colaborando en la operación de búsqueda\"."
    VisualName: " %1, documento 5/8"
  Fredricson_6:
    Text: "Crímenes y Accidentes: \"¡Advertimos a todos nuestros invitados de que adentrarse en el complejo sin guía podía resultar peligroso', afirma el equipo de IA. Prometen dedicar todos sus esfuerzos a encontrar al desaparecido\"."
    VisualName: " %1, documento 6/8"
  Fredricson_7:
    Text: "Crímenes y Accidentes: \"El fallecido hallado en el complejo de IA ha sido identificado como el señor J. Fredricson. La causa de la muerte fue la deshidratación, tras pasar cinco días perdido en el descomunal complejo\"."
    VisualName: " %1, documento 7/8"
  Fredricson_8:
    Text: "Crímenes y Accidentes: \"El portavoz de la IA niega los rumores que afirman que el fallecido se enfrentó a peligros desconocidos antes de morir. 'La mayor parte del complejo son pasillos vacíos y hardware', afirma, 'pero estamos trabajando para mejorar la seguridad'\"."
    VisualName: " %1, documento 8/8"
  HumanNRobots_1:
    Text: "¿Qué hace que una persona sea persona? ¿Su autoconsciencia, combinada con su individualidad en el mundo?"
    VisualName: " %1, capítulo 1/8"
  HumanNRobots_2:
    Text: "Los gemelos, incluso los univitelinos, son sin duda dos personas diferentes, ya que viven experiencias vitales únicas. Pero ¿ocurre lo mismo con los sujetos (dos o más) que también comparten experiencias vitales?"
    VisualName: " %1, capítulo 2/8"
  HumanNRobots_3:
    Text: "La diferencia principal entre los humanos y las computadoras es que los humanos cuentan con libre albedrío."
    VisualName: " %1, capítulo 3/8"
  HumanNRobots_4:
    Text: "A diferencia de los intelectos artificiales, los humanos pueden tomar decisiones verdaderamente irracionales, lo cual constituye, paradójicamente, su debilidad y su fortaleza."
    VisualName: " %1, capítulo 4/8"
  HumanNRobots_5:
    Text: "Los sistemas computacionales son capaces de evolucionar pero, al parecer, las personas (incluidas las artificiales) son las únicas capaces de sufrir."
    VisualName: " %1, capítulo 5/8"
  HumanNRobots_6:
    Text: "Si la consciencia humana no es más que la interconexión de células cerebrales, podría ser posible reubicar una persona a un dispositivo de hardware artificial, reemplazando las neuronas por microcircuitos."
    VisualName: " %1, capítulo 6/8"
  HumanNRobots_7:
    Text: "Hay quien afirma que la evolución es imposible sin sufrimiento (aunque no tiene por qué ser físico). Por ejemplo, aprender a través de la experiencia es imposible si no se sufre por los errores cometidos."
    VisualName: " %1, capítulo 7/8"
  HumanNRobots_8:
    Text: "Pregunta: ¿Está éticamente justificada la promesa de la evolución para algunos a cambio del sufrimiento de todos?"
    VisualName: " %1, capítulo 8/8"
  News_1:
    Text: "The Prometheus News: \"El interior, diseñado con gran inteligencia, hace que los invitados de la gala inaugural se sientan como si hubiesen viajado al futuro. Una gran ovación recibió las primeras palabras de SAM\"."
    VisualName: " %1, recorte 1/20"
  News_10:
    Text: "Man and His Right Daily: \"Los manifestantes se agrupan cerca del complejo para exigir la prohibición de la inteligencia artificial. Su preocupación es que los humanos pierdan el control de la computadora. Les mantendremos informados de la situación\"."
    VisualName: " %1, recorte 10/20"
  News_11:
    Text: "Man and His Right Daily: \"Como puede que sepan, SAM [como llaman a esta supercomputadora] es un sistema basado en el autoaprendizaje. Un detractor afirma que es como un niño capaz de aprender de malos ejemplos\"."
    VisualName: " %1, recorte 11/20"
  News_12:
    Text: "Man and His Right Daily: \"El profesor Sterling ha llegado a la gala. La multitud, que incluye a muchos de sus estudiantes, lo recibe a gritos. ¿Se convertirá Sterling en el mentor de SAM?\"."
    VisualName: " %1, recorte 12/20"
  News_13:
    Text: "Tomorrow's Herald: \"Los asistentes están entusiasmados. La habilidad de SAM de juzgar riesgos al instante la convierte en una herramienta esencial para la economía. Hay quien habla de construir una versión de SAM modificada para usar en sus negocios\"."
    VisualName: " %1, recorte 13/20"
  News_14:
    Text: "Tomorrow's Herald: \"La visita guiada por el complejo antes del inicio del evento oficial demuestra que, sin desvelar todos sus secretos, resultaría prácticamente imposible interferir en las operaciones de SAM\"."
    VisualName: " %1, recorte 14/20"
  News_15:
    Text: "Tomorrow's Herald: \"La base de datos de SAM contiene más que economía y política. Conocía a cada uno de los asistentes a la gala y a sus familiares. Incluso ayudó a algunos de ellos a escoger escuela para sus hijos con ayuda de las estadísticas\"."
    VisualName: " %1, recorte 15/20"
  News_16:
    Text: "Tomorrow's Herald: \"Como obsequio, SAM escaneó a todos los invitados y les proporcionó un informe médico completo. Algunos parecían más contentos que otros con el resultado. Además del informe, SAM les ofreció consejos de salud\"."
    VisualName: " %1, recorte 16/20"
  News_2:
    Text: "The Prometheus News: \"El presidente del consejo académico afirmó que SAM es 'el primer tímido paso de la humanidad hacia un mundo sin discriminación social'. Se trata de una emisaria del futuro y de su augur al mismo tiempo\"."
    VisualName: " %1, recorte 2/20"
  News_3:
    Text: "The Prometheus News: \"Sin embargo, los intereses de los patrocinadores del proyecto se centran en el presente, no el futuro. ¿Qué utilidad tendrá SAM para la humanidad hoy en día? La discusión sobre este punto es acalorada\"."
    VisualName: " %1, recorte 3/20"
  News_4:
    Text: "The Prometheus News: \"El profesor Sterling llegó prácticamente al final del evento. Opinó que SAM aún debe ganarse la confianza de la humanidad, y que es esencial que un humano le enseñe todo lo que sabe\"."
    VisualName: " %1, recorte 4/20"
  News_5:
    Text: "The Prometheus News: \"Un entusiasta seguidor de la IA invitó al Presidente a renunciar a su puesto a mitad de su legislatura: 'Los gobiernos ya no son necesarios. La IA resolverá los mismos problemas con mayor eficacia'\"."
    VisualName: " %1, recorte 5/20"
  News_6:
    Text: "The Prometheus News: \"Tras la clausura oficial de la gala, el profesor Sterling salió del complejo a encontrarse con los detractores y pidió a la policía que se retirase. 'Pasaré un año 'dentro' de la IA antes de dar mi veredicto final sobre ella'\"."
    VisualName: " %1, recorte 6/20"
  News_7:
    Text: "\"La IA será capaz de redistribuir los recursos mundiales de forma inteligente para prevenir el hambre y la enfermedad y reducir el crimen. Sin embargo, la felicidad es un concepto subjetivo\", afirma el profesor Sterling."
    VisualName: " %1, recorte 7/20"
  News_8:
    Text: "\"El profesor Sterling se siente inspirado por la nueva tecnología, pero advierte que no se puede descartar que ocurran casos de fuerza mayor. Los creadores de la IA carecen de plan B. ¿Y si SAM cae en malas manos?\"."
    VisualName: " %1, recorte 8/20"
  News_9:
    Text: "Man and His Right Daily: \"Científicos y empresarios se reúnen para inaugurar el complejo que contendrá la 'computadora intelectual'. Representantes de medios de comunicación libres invitados a la gala: cero\"."
    VisualName: " %1, recorte 9/20"
  Shifts_1:
    Text: "¡El complejo es enorme! No me esperaba que se pareciera tanto a la tumba de un faraón por dentro. Es extraño; muchos pasillos están cerrados con muros de más de dos metros de alto."
    VisualName: " %1, entrada 1/8"
  Shifts_2:
    Text: "Resulta extraño cuánto oscila el voltaje eléctrico algunas tardes. No es nada serio, pero me pone un poco nervioso. ¿Cómo es posible que se use una cantidad tan alta de recursos durante la hora que aparece marcada en el horario de pruebas?"
    VisualName: " %1, entrada 2/8"
  Shifts_3:
    Text: "Vi que sacaron a un hombre con quemaduras graves del laboratorio... Media hora más tarde vi pasar otra camilla, y juraría que era el mismo hombre de antes, ¡pero sin quemaduras! Necesito tomarme un día libre..."
    VisualName: " %1, entrada 3/8"
  Shifts_4:
    Text: "¡Nunca he visto un lío de cables tan extremo en mi vida! Parece que los constructores del complejo no prestaron demasiada atención a dónde colocaban los nodos de alimentación. Están por todas partes e instalados sin orden ni concierto."
    VisualName: " %1, entrada 4/8"
  Shifts_5:
    Text: "El turno de anoche fue escalofriante. Oí gritos. Cuando acudí corriendo a investigar, vi a compañeros míos arrastrando a un tipo en bata de hospital hacia el laboratorio. Me dijeron que mantuviera la boca cerrada si quería seguir trabajando aquí..."
    VisualName: " %1, entrada 5/8"
  Shifts_6:
    Text: "No acabo de acostumbrarme a tantos cambios en el complejo. Los mapas del mes pasado ya no sirven. ¡He oído que un par de infelices de mantenimiento se desplomaron desde una altura de dos niveles!"
    VisualName: " %1, entrada 6/8"
  Shifts_7:
    Text: "¡La inteligencia artificial del complejo es increíble! Es un placer jugar con ella al ajedrez. ¡Me apuesto que la muy pilla me ha dejado ganar una o dos veces! Obviamente, derrotar a un humano no es problema para ella."
    VisualName: " %1, entrada 7/8"
  Shifts_8:
    Text: "Los del laboratorio dicen que la voz de la IA no se eligió al azar. Buscaron una voz que transmitiese tranquilidad a los humanos. ¡Por eso es tan agradable charlar con ella!"
    VisualName: " %1, entrada 8/8"
  SwarmSpec_1:
    Text: "El sistema ENJAMBRE se diseñó originalmente para cirugías complejas. Era un prototipo del equipo médico del futuro."
    VisualName: " %1, página 1/4"
  SwarmSpec_2:
    Text: "En la práctica, sin embargo, ENJAMBRE resultó poco seguro para ocuparse de tareas médicas, además de extremadamente peligroso. Un accidente mortal obligó a sus creadores a abandonar el proyecto."
    VisualName: " %1, página 2/4"
  SwarmSpec_3:
    Text: "No obstante, ENJAMBRE acabó resultando bastante flexible. Gracias a ciertas modificaciones, la herramienta quirúrgica fracasada se convirtió en un efectivo sistema de seguridad."
    VisualName: " %1, página 3/4"
  SwarmSpec_4:
    Text: "ENJAMBRE reacciona al calor corporal, al movimiento y al pulso. Su objetivo se establece mediante estrictos parámetros biológicos que evitan cualquier posibilidad de muerte accidental. Se encarga de patrullar una zona concreta que nunca abandona."
    VisualName: " %1, página 4/4"
