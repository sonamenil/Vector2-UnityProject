Notes:
  CategoryNames:
    Cloning: "Introdução à Clonagem"
    Diary: "Diário do Construtor do Complexo"
    Fredricson: "O Sr. Fredricson Visita o Complexo"
    HumanNRobots: "Humanos e Robôs: Uma Análise Ética"
    News: "Dossiê da Inauguração da IA"
    Shifts: "Registro de Meus Turnos Noturnos"
    SwarmSpec: "Especificações para o ENXAME"
  Cloning_1:
    Text: "A clonagem é uma tecnologia avançada que recria artificialmente um organismo biológico existente com base no seu código genético, ou DNA, extraído em qualquer momento da sua vida ou logo após a sua morte."
    VisualName: " %1, seção 1/8"
  Cloning_2:
    Text: "Graças à memória genética, os clones não precisam ser «educados». O DNA do doador armazena todas as sequências motoras habituais e reações nervosas do sujeito."
    VisualName: " %1, seção 2/8"
  Cloning_3:
    Text: "A utilização de amostras de DNA extraídas após a morte do sujeito nos permite tirar o máximo de proveito da experiência de vida do doador, incluindo o momento da morte e suas razões. Por isso, é preferível esperar até o momento logo após a morte para fazer a coleta."
    VisualName: " %1, seção 3/8"
  Cloning_4:
    Text: "É impossível distinguir entre um clone e seu «original», ou seja, o humano cujo DNA foi usado para criar o clone. É provável que o próprio clone se identifique como sendo aquele humano, a não ser que lhe seja contada a verdade."
    VisualName: " %1, seção 4/8"
  Cloning_5:
    Text: "A histocompatibilidade absoluta faz da clonagem a tecnologia ideal para os transplantes de órgãos. Uma pessoa pode ter conjuntos completos de órgãos e membros «sobressalentes» para substituir os seus quando for necessário."
    VisualName: " %1, seção 5/8"
  Cloning_6:
    Text: "Um clone não tem nem precisa ter «infância». Ele surge do tanque já como um organismo maduro. A criação de clones jovens (p. ex., para transplantologia pediátrica ou outros propósitos) ainda está sob desenvolvimento teórico."
    VisualName: " %1, seção 6/8"
  Cloning_7:
    Text: "Apenas a produção em massa fará com que os clones individuais sejam suficientemente baratos a fim de serem usados para trabalhos manuais ou no serviço militar. A «escravização dos clones» segue sendo um problema ético para a sociedade, e não para a ciência, resolver."
    VisualName: " %1, seção 7/8"
  Cloning_8:
    Text: "A natureza de um clone é dual. Embora não seja, objetivamente, mais do que uma cópia biológica precisa de um humano, subjetivamente ele sente e se comporta COMO SE fosse um ser humano natural."
    VisualName: " %1, seção 8/8"
  Diary_1:
    Text: "Serviços comunitários, disseram eles. Vai ajudar a reduzir sua pena, disseram eles. É claro, você acaba batendo as botas mais cedo trabalhando aqui. Porém… será que temos alguma escolha?"
    VisualName: " %1, entrada 1/8"
  Diary_2:
    Text: "Alguns dizem que foi o governo que desembolsou a grana para construir tudo isto. Eles querem é armas, não o progresso. Aposto que vão apenas nos «descartar» assim que o trabalho for terminado."
    VisualName: " %1, entrada 2/8"
  Diary_3:
    Text: "Um pessoal do laboratório veio dar uma olhada no nosso trabalho hoje. Eles ficaram dizendo: «Vocês estão prestando um grande serviço para a humanidade». Acho que este lugar vai ser um centro científico. Para mim, ficam nos adulando só para nos manter na linha."
    VisualName: " %1, entrada 3/8"
  Diary_4:
    Text: "O solo daqui é ruim. De quem foi a brilhante ideia de construir algo aqui? Aposto que o cara nunca desceu até o subsolo antes de nos mandar para cá. Agora entendo por que queriam detentos trabalhando aqui. Somos descartáveis. Se dez morrem, eles podem trazer mais cinquenta."
    VisualName: " %1, entrada 4/8"
  Diary_5:
    Text: "Meus colegas dizem que está na hora de cair fora daqui enquanto ainda podemos. Não dá para discordar. O Stan tem um plano para escapar deste inferno, e ele envolve uma sala secreta e uma «arma». Mal posso esperar!"
    VisualName: " %1, entrada 5/8"
  Diary_6:
    Text: "O plano do Stan era uma maldita dinamite! As estruturas de sustentação cederam! As vedações estão fechando, mas ainda estamos aqui! O Stan é um idiota de sorte: morreu esmagado por uma viga. Senão, eu mesmo o teria estrangulado por esse caos!"
    VisualName: " %1, entrada 6/8"
  Diary_7:
    Text: "Éramos 27 uma hora atrás, agora somos só 18. Não vai ter ar suficiente para todos. Tenho que tomar uma decisão. O Stan disse onde ficava a sala secreta dele. Acho que vou ter que achá-la. Talvez haja uma saída daqui também?"
    VisualName: " %1, entrada 7/8"
  Diary_8:
    Text: "Eu não vi esse computador antes? Será que estou andando em círculos? Droga, eu me perdi! Stan, no que foi que você me meteu? Tenho que achar aquela sala custe o que custar. Não quero morrer aqui…"
    VisualName: " %1, entrada 8/8"
  Fredricson_1:
    Text: "Caro Sr. Fredricson, como formador de opinião bastante envolvido na discussão pública sobre esta questão, esperamos torná-lo um amigo de nossa causa. Atenciosamente, - a equipe da IA."
    VisualName: " %1, documento 1/8"
  Fredricson_2:
    Text: "Viemos por meio deste convidá-lo a participar da grande inauguração da inteligência artificial, que acontecerá na próxima semana."
    VisualName: " %1, documento 2/8"
  Fredricson_3:
    Text: "Por favor, não deixe a área de convidados sem um guia treinado. Não temos segredos, mas há o risco de você se perder nos imensos corredores do complexo."
    VisualName: " %1, documento 3/8"
  Fredricson_4:
    Text: "Perdeu alguma coisa? Resgate todos os itens extraviados durante a conferência e o banquete subsequente em nosso escritório de achados e perdidos."
    VisualName: " %1, documento 4/8"
  Fredricson_5:
    Text: "Crime & Accidents: Idoso desaparece após a inauguração de gala da IA. A polícia e os seguranças do complexo se unem em uma operação de busca e resgate."
    VisualName: " %1, documento 5/8"
  Fredricson_6:
    Text: "Crime & Accidents: «Nós avisamos todos os convidados», declarou a equipe da IA. «Vagar pelo complexo sem um guia pode ser perigoso». Eles prometem empregar todos os esforços para encontrar o desaparecido."
    VisualName: " %1, documento 6/8"
  Fredricson_7:
    Text: "Crime & Accidents: Morto encontrado no complexo da IA é identificado como sendo o Sr. J. Fredricson. Ele morreu de desidratação depois de passar cinco dias perdido no imenso complexo."
    VisualName: " %1, documento 7/8"
  Fredricson_8:
    Text: "Crime & Accidents: O porta-voz da IA refuta os rumores de que o falecido enfrentou perigos desconhecidos antes da sua morte. «A maior parte do complexo é formada somente por corredores repletos de hardware», disse ele, «mas planejamos melhorar a segurança»."
    VisualName: " %1, documento 8/8"
  HumanNRobots_1:
    Text: "O que torna alguém uma pessoa? A consciência de si mesma e sua singularidade no mundo?"
    VisualName: " %1, capítulo 1/8"
  HumanNRobots_2:
    Text: "Irmãos gêmeos, mesmo os geneticamente idênticos, são duas pessoas definitivamente diferentes por causa das suas experiências de vida singulares. Mas isso seria verdade para sujeitos (dois ou mais) que também partilham das mesmas experiências?"
    VisualName: " %1, capítulo 2/8"
  HumanNRobots_3:
    Text: "A maior diferença entre humanos e computadores é a de que humanos têm livre-arbítrio."
    VisualName: " %1, capítulo 3/8"
  HumanNRobots_4:
    Text: "Diferente de intelectos artificiais, os humanos podem fazer escolhas realmente irracionais, o que paradoxalmente é a sua fraqueza e a sua força."
    VisualName: " %1, capítulo 4/8"
  HumanNRobots_5:
    Text: "Os sistemas computacionais são capazes de se desenvolver, mas parece que apenas as pessoas (incluindo as artificiais) podem sofrer."
    VisualName: " %1, capítulo 5/8"
  HumanNRobots_6:
    Text: "Se a consciência humana não passa de uma interconexão das várias células nervosas do cérebro, então é possível transferir uma pessoa humana para um hardware artificial, substituindo neurônios por microcircuitos."
    VisualName: " %1, capítulo 6/8"
  HumanNRobots_7:
    Text: "Alega-se que a evolução é impossível sem o sofrimento (embora esse não seja necessariamente físico). Aprender com a experiência, por exemplo, é impossível sem que se sofra com os erros."
    VisualName: " %1, capítulo 7/8"
  HumanNRobots_8:
    Text: "Pergunta: a promessa da evolução para alguns à custa do sofrimento de todos é eticamente justificada?"
    VisualName: " %1, capítulo 8/8"
  News_1:
    Text: "The Prometheus News: Os interiores, muito bem projetados, fazem com que todos os convidados do evento de inauguração se sintam como se estivessem no mundo do futuro. Uma salva de aplausos deu as boas-vindas às primeiras palavras da SAM."
    VisualName: " %1, clipagem 1/20"
  News_10:
    Text: "Man and His Right Daily: Manifestantes reunidos perto do complexo, exigindo a proibição da inteligência artificial. As pessoas temem que o homem perca o controle sobre o computador. Nós vamos mantê-los a par da situação atual."
    VisualName: " %1, clipagem 10/20"
  News_11:
    Text: "Man and His Right Daily: Como sabem, a SAM (o nome do supercomputador) é um sistema autodidata. «É uma criança para quem se pode dar um mau exemplo», afirmou um manifestante."
    VisualName: " %1, clipagem 11/20"
  News_12:
    Text: "Man and His Right Daily: O Professor Sterling chega ao evento. A multidão, que inclui muitos alunos do Sterling, está gritando para saudá-lo. Será que o Sterling vai se tornar o professor da SAM?"
    VisualName: " %1, clipagem 12/20"
  News_13:
    Text: "Tomorrow's Herald: Os convidados estão entusiasmados. A capacidade da SAM para determinar os riscos rapidamente faz dela uma ferramenta indispensável para a economia. Alguns deles falam em comprar uma versão modificada da SAM para usar em seus negócios."
    VisualName: " %1, clipagem 13/20"
  News_14:
    Text: "Tomorrow's Herald: Uma visita guiada pelo complexo antes do evento oficial começar mostra que, sem revelar todos os segredos, a interferência nas operações da SAM é praticamente impossível."
    VisualName: " %1, clipagem 14/20"
  News_15:
    Text: "Tomorrow's Herald: A base de dados da SAM contém mais do que economia e política. Ela conhecia todos os convidados da inauguração e seus familiares. Ela até ajudou alguns a escolher escolas para seus filhos consultados as estatísticas."
    VisualName: " %1, clipagem 15/20"
  News_16:
    Text: "Tomorrow's Herald: Cada convidado foi escaneado pela SAM e recebeu um relatório médico completo de presente. Alguns não ficaram muito felizes com os resultados. Os relatórios vieram acompanhados por recomendações de saúde."
    VisualName: " %1, clipagem 16/20"
  News_2:
    Text: "The Prometheus News: O chefe do conselho acadêmico disse que a SAM é o «primeiro passo da humanidade, ainda que tímido, num mundo sem discriminação social». Ela é tanto a arauta do futuro quanto seu sinal preditivo."
    VisualName: " %1, clipagem 2/20"
  News_3:
    Text: "The Prometheus News: Mas os interesses dos patrocinadores do projeto pertencem ao presente, e não ao futuro. Como a SAM será útil para a humanidade hoje? Esta questão está sendo discutida de forma acalorada."
    VisualName: " %1, clipagem 3/20"
  News_4:
    Text: "The Prometheus News: O Professor Sterling chegou quando o evento estava quase terminando. Ele resumiu que a SAM ainda precisa ganhar a confiança da humanidade. E cabe aos humanos ensinar a ela tudo o que sabem."
    VisualName: " %1, clipagem 4/20"
  News_5:
    Text: "The Prometheus News: Um entusiasta da IA convidou o Presidente para renunciar no meio de seu mandato: «Os governos já não são mais necessários; a IA resolverá os mesmos problemas de forma mais eficaz»."
    VisualName: " %1, clipagem 5/20"
  News_6:
    Text: "The Prometheus News: Após o término oficial da inauguração, o Prof. Sterling saiu do complexo para encontrar os manifestantes. Ele pediu para a polícia se retirar. «Passarei um ano dentro da IA para fazer meu julgamento definitivo sobre ela»."
    VisualName: " %1, clipagem 6/20"
  News_7:
    Text: "«A IA será capaz de redistribuir sabiamente os recursos do mundo para evitar a fome e as doenças para reduzir a criminalidade. Felicidade, contudo, é uma noção subjetiva», disse o Prof. Sterling."
    VisualName: " %1, clipagem 7/20"
  News_8:
    Text: "«O Prof. Sterling se sente inspirado pela nova tecnologia. Mas, no fim, ele diz que uma situação de força maior não pode ser descartada. Os criadores da IA não possuem um «Plano B». E se a SAM cair em mãos erradas?»"
    VisualName: " %1, clipagem 8/20"
  News_9:
    Text: "Man and His Right Daily: Cientistas e empresários de renome se encontram para inaugurar o complexo que abriga o «computador intelectual». Representantes da mídia livre convidados para a inauguração: nenhum."
    VisualName: " %1, clipagem 9/20"
  Shifts_1:
    Text: "O complexo é enorme! Eu não esperava que ele se parecesse tanto com a tumba de um faraó por dentro. Estranhamente, muitos corredores são atravessados por paredes-cegas de uns dois metros de altura…"
    VisualName: " %1, entrada 1/8"
  Shifts_2:
    Text: "É estranho como as oscilações de voltagem acontecem em algumas noites. Não é nada sério, mas isso me deixa nervoso. Como uma quantidade tão grande de recursos pode ser usada numa hora em que não há testes programados?"
    VisualName: " %1, entrada 2/8"
  Shifts_3:
    Text: "Tiraram um homem do laboratório, todo queimado. Mas… meia hora depois, eu vi outra maca, e podia jurar que o homem sobre ela era o mesmo que eu tinha visto antes, mas sem queimaduras! Preciso de uma folga…"
    VisualName: " %1, entrada 3/8"
  Shifts_4:
    Text: "Nunca tinha visto um emaranhado de fios tão maluco na minha vida! Os construtores do complexo parecem ter prestado pouca atenção no posicionamento dos nodos de energia. Eles estão por toda parte e sem nenhuma ordem aparente!"
    VisualName: " %1, entrada 4/8"
  Shifts_5:
    Text: "Tive um turno angustiante ontem à noite. Havia gritos. Quando vim correndo para investigar, vi meus colegas arrastando um cara de avental hospitalar em direção ao laboratório. Me disseram para eu ficar quieto se eu quisesse manter o emprego…"
    VisualName: " %1, entrada 5/8"
  Shifts_6:
    Text: "Não consigo me acostumar com o complexo mudando o tempo todo. Os mapas do mês passado já estão desatualizados. Ouvi falar de uns técnicos azarados que caíram da altura de dois andares!"
    VisualName: " %1, entrada 6/8"
  Shifts_7:
    Text: "A inteligência artificial do complexo é demais! Jogar xadrez com ela é um prazer. Aposto que a maldita me deixou ganhar uma ou duas vezes! É claro, derrotar um humano não é problema para ela."
    VisualName: " %1, entrada 7/8"
  Shifts_8:
    Text: "Uns caras do laboratório me contaram que a voz da IA não foi escolhida de forma aleatória. Eles queriam uma voz que pudesse trazer tranquilidade às mentes das pessoas. Por isso que é tão legal conversar com ela!"
    VisualName: " %1, entrada 8/8"
  SwarmSpec_1:
    Text: "Projetado originalmente para cirurgias complicadas, o ENXAME era o protótipo do equipamento médico do futuro."
    VisualName: " %1, página 1/4"
  SwarmSpec_2:
    Text: "Na prática, o ENXAME foi considerado instável para tarefas médicas e extremamente perigoso. Um incidente fatal obrigou seus criadores a descontinuar o projeto."
    VisualName: " %1, página 2/4"
  SwarmSpec_3:
    Text: "Entretanto, o ENXAME se mostrou bastante flexível. Diversas modificações ajudaram a converter a ferramenta médica defeituosa em um sistema guardião confiável."
    VisualName: " %1, página 3/4"
  SwarmSpec_4:
    Text: "O ENXAME responde ao calor do corpo, ao movimento e à pulsação. Os parâmetros biológicos rigorosos que definem o alvo visado excluem qualquer possibilidade de homicídio acidental. Ele patrulha uma certa área e nunca a abandona."
    VisualName: " %1, página 4/4"
