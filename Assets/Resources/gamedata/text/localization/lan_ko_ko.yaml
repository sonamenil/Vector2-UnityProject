Notes:
  CategoryNames:
    Cloning: "클론 기술의 ABC"
    Diary: "시설 건축 노동자의 일기"
    Fredricson: "Mr. 프레데릭슨의 시설 방문"
    HumanNRobots: "인간과 로봇: 도덕적 재고"
    News: "A. I. 갈라 오프닝 보도 자료 일체"
    Shifts: "내 야간 근무 기록"
    SwarmSpec: "스웜 세부사항"
  Cloning_1:
    Text: "클로닝은 현존하는 생물체의 유전자 코드 또는 DNA를 기반으로 인공적으로 그 생물체를 복제하는 기술로 해당 생물체가 생존 여부와는 무관하게 복제가 가능합니다."
    VisualName: " %1, 섹션 1/8"
  Cloning_2:
    Text: "클론은 \"교육\"을 받을 필요가 없습니다. 유전자 메모리 덕분인데요 기증자의 DNA에 복제 원본의 습관적인 움직임이나 신경 반응이 저장되어 있기 때문입니다."
    VisualName: " %1, 섹션 2/8"
  Cloning_3:
    Text: "포스트 모템 DNA 샘플을 클로닝에 사용하면 DNA 기증자의 삶을 가능한 한 재현할 수 있으며 죽음의 순간과 사인까지도 기억하도록 할 수 있습니다. 따라서 DNA 수집은 사망 직후에 하는 것이 용이합니다."
    VisualName: " %1, 섹션 3/8"
  Cloning_4:
    Text: "클론을 \"원본\", 즉 클론을 생성하는데 사용된 DNA 기증자와 구분하는 것은 불가능합니다. 클론임을 밝히지 않는 이상 원본과 동일하게 인식됩니다."
    VisualName: " %1, 섹션 4/8"
  Cloning_5:
    Text: "완벽한 조직 적합성이 클로닝을 이상적인 이식학으로 만들어줍니다. \"예비\" 장기와 팔다리를 필요애 따라 보유할 수 있게 되는 것이지요."
    VisualName: " %1, 섹션 5/8"
  Cloning_6:
    Text: "클론은 \"어린 시절\"을 가질 필요가 없습니다. 탱크에서 완전히 성장한 채로 생산이 됩니다. 어린 클론을 생성하는 것(예를 들면 소아과 이식 또는 다른 목적으로)은 아직 이론적 개발 단계에 있습니다."
    VisualName: " %1, 섹션 6/8"
  Cloning_7:
    Text: "대량 생산을 통해서만 개별 클론의 단가를 맞춰 단순 노동이나 군사 목적으로 사용할 수 있습니다.\" 클론 노예제\"는 여전히 도덕적 문제로 남아 있지만 이는 과학이 아닌 사회가 해결할 문제입니다."
    VisualName: " %1, 섹션 7/8"
  Cloning_8:
    Text: "클론의 본질은 복합적입니다. 객관적으로 클론은 한 인간의 생물학적 완전 복제품이지만 주관적으로 이 클론은 자연 상태의 인간처럼 느끼고 행동합니다."
    VisualName: " %1, 섹션 8/8"
  Diary_1:
    Text: "사회봉사를 하라고 하지. 사회 봉사를 하면 형량이 줄어든다고. 당연히 여기서 일하면 빨리 나가겠지. 그걸 떠나서 우리한테 선택권이 있기는 해?"
    VisualName: " %1, 입구 1/8"
  Diary_2:
    Text: "어떤 놈들은 정부에서 이걸 만들려고 재료를 준비했다던데. 놈들이 원하는 건 진보가 아니라 무기라고. 작업만 끝나면 우리같은 목격자들은 전부 '처분'해 버릴걸."
    VisualName: " %1, 입구 2/8"
  Diary_3:
    Text: "오늘은 가운 입은 놈들이 와서 작업을 체크했다. 놈들이 말하길 \"여러분은 인류에 있어 훌륭한 일을 하고 계십니다.\" 라더군. 무슨 과학 머시기가 될 거라던데. 그저 계속 일하게 만들려는 헛소리지."
    VisualName: " %1, 입구 3/8"
  Diary_4:
    Text: "여긴 지반이 안좋다. 어떤 놈이 여기에 건물을 짓자고 한거야? 분명 우리를 투입하기 전에 여기에 와 본 적도 없는 놈일 것이다. 이제야 수감자들을 보내 작업을 하게 한 이유를 알겠군. 쓰고 버리려는 거야. 열 명이 죽으면 쉰 명을 더 데려올 수 있으니."
    VisualName: " %1, 입구 4/8"
  Diary_5:
    Text: "동료들이 말하길 아직 살아서 나갈 수 있을때 나가야 한다고 한다. 부정할 수 없군. 스탠이 비밀의 방이랑 '무기'를 챙겨서 이 지옥구덩이를 빠져나갈 계획이 있다고 한다. 기대된다."
    VisualName: " %1, 입구 5/8"
  Diary_6:
    Text: "스탠의 계획이라는 게 알고보니 다이나마이트였다! 무게를 버티고 있던 구조가 날아가 버렸어! 현장은 닫혔지면 우린 여전히 갇힌 상태다. 스탠 놈은 운좋게도 떨어지는 사다리에 맞아 뒈져버렸다. 아직 살아있었다면 내 손으로 죽였을 텐데!"
    VisualName: " %1, 입구 6/8"
  Diary_7:
    Text: "갇힌 지 27시간이 지났다, 이제 18명밖에 안남았다. 산소도 부족하다. 결단을 해야 할 때다. 스탠은 비밀의 방이 어딘지 알려주지 않았다. 내가 찾아야 할 것 같군. 여기서 나갈 방법도 있지 않을까?"
    VisualName: " %1, 입구 7/8"
  Diary_8:
    Text: "이 컴퓨터 비슷한걸 전에도 본 적이 있던가? 같은 곳을 빙빙 돌고 있는건가? 젠장, 길을 잃었다! 스탠, 대체 날 어디로 끌어들인 거냐? 무슨 일이 있어도 비밀 방을 찾고 말겠다. 여기서 죽긴 싫어..."
    VisualName: " %1, 입구 8/8"
  Fredricson_1:
    Text: "프레데릭슨 씨에게, 이 문제에 관한 공개적 토론에 있어 한 쪽을 대표하는 입장으로써 저희는 저희 필요에 맞는 새 친구를 만들어 주시기를 희망하는 바입니다. 진심을 담아. - A.I. 팀."
    VisualName: " %1, 문서 1/8"
  Fredricson_2:
    Text: "귀하께서는 다음 주에 열릴 인공 지능 공개 행사에 초청되셨습니다."
    VisualName: " %1, 문서 2/8"
  Fredricson_3:
    Text: "가이드의 안내 없이 지정된 객석을 벗어나지 말아 주시기 바랍니다. 저희는 숨기는 사항이 없으나 복잡한 통로에서 길을 잃어버리는 사태를 방지하기 위함입니다."
    VisualName: " %1, 문서 3/8"
  Fredricson_4:
    Text: "분실품이 있으시다구요? 행사 및 연회에서 분실한 물품은 저희 분실물 안내소에서 찾아가시기 바랍니다."
    VisualName: " %1, 문서 4/8"
  Fredricson_5:
    Text: "사건 & 사고: \"노인 한 명이 A.I. 공개식에서 실종. 경찰 및 시설 보안요원들이 수색 및 구출 작업에 나섰습니다.\""
    VisualName: " %1, 문서 5/8"
  Fredricson_6:
    Text: "사건 & 사고: \"A.I. 팀원은 '모든 손님들께 미리 경고를 드렸다' 라고 합니다. '가이드 없이 시설 내를 방황하는 것은 위험할 수 있습니다.' 이들은 실종자를 찾기 위해 모든 노력을 다 할 것이라고 약속했습니다.\""
    VisualName: " %1, 문서 6/8"
  Fredricson_7:
    Text: "사건 & 사고: \"A.I. 시설에서 발견된 사체는 J. 프레데릭슨 씨로 밝혀졌습니다. 대형 시설 내에서 실종된 지 5일, 수분 부족으로 사망한 것으로 보입니다."
    VisualName: " %1, 문서 7/8"
  Fredricson_8:
    Text: "사건 & 사고: \"A.I. 시설측 대변인은 고인이 예기치 못한 위험을 사망 직전에 마주한 것으로 보인다는 루머를 일축했습니다. '시설 대부분은 하드웨어로 가득한 빈 복도일 뿐이지만 보안 시설은 개선하도록 하겠다' 라고 말했습니다."
    VisualName: " %1, 문서 8/8"
  HumanNRobots_1:
    Text: "무엇이 사람을 만드는가? 세계에 존재한다는 특별함과 자존감의 결합?"
    VisualName: " %1, 챕터 1/8"
  HumanNRobots_2:
    Text: "일란성 쌍둥이조차도 각각 다른 경험을 통해 완전히 다른 객체가 된다. 그러면 완전히 같은 경험을 한 하나 이상의 객체에게도 이 법칙이 적용될 것인가?"
    VisualName: " %1, 챕터 2/8"
  HumanNRobots_3:
    Text: "인간과 컴퓨터의 가장 큰 차이점은 인간에게는 자유 의지가 있다는 것이다."
    VisualName: " %1, 챕터 3/8"
  HumanNRobots_4:
    Text: "인공 지능과는 다르게 인간은 비이성적인 선택을 할 수 있다. 이는 역설적이게도 인간의 장점이자 단점이다."
    VisualName: " %1, 챕터 4/8"
  HumanNRobots_5:
    Text: "컴퓨터 시스템도 진화할 수 있지만 인공적인 인간을 포함해 인간만이 진정으로 진화 과정에서 고통을 느낄 수 있는 듯 하다."
    VisualName: " %1, 챕터 5/8"
  HumanNRobots_6:
    Text: "인간의 양심이 뇌신경의 상호작용에 불과하다면 뉴런을 마이크로서킷으로 교체해 인간의 의식을 하드웨어에 이식하는 것도 가능할 것이다."
    VisualName: " %1, 챕터 6/8"
  HumanNRobots_7:
    Text: "고통 없이는 진화가 불가능하다(고통이 반드시 물리적일 필요는 없지만)는 주장이 있다. 예를 들어 실수를 통해 고통을 받지 않으면 경험을 통한 학습이 불가능하다는 것이다."
    VisualName: " %1, 챕터 7/8"
  HumanNRobots_8:
    Text: "질문: 그렇다면 도덕적으로 정당화 된 모든 객체에게 고통을 통한 약속된 진화가 가능한 것인가?"
    VisualName: " %1, 챕터 8/8"
  News_1:
    Text: "프로메테우스 뉴스: \"잘 디자인한 인테리어는 공개식 파티 분위기를 마치 미래에 있는 것처럼 꾸며주었습니다. 우레와 같은 박수가 SAM의 첫 마디를 장식해 주었습니다.\""
    VisualName: " %1, 클리핑 1/20"
  News_10:
    Text: "일간 인간과 권리: \"시설 주변에는 시위대가 모여 인공 지능 금지를 요구하는 집회를 열었습니다. 사람들은 인간이 컴퓨터에 대한 통제를 잃을지 모른다고 걱정합니다. 현재 상황 진행에 따라 계속 보도 드리겠습니다.\""
    VisualName: " %1, 클리핑 10/20"
  News_11:
    Text: "일간 인간과 권리: \"아시다시피, SAM(인공지능 컴퓨터의 이름)은 자가 학습 시스템입니다. 시위대에 따르면 '누군가 안좋은 모범을 보일 수 있는 어린애'와 같다고 합니다.\""
    VisualName: " %1, 클리핑 11/20"
  News_12:
    Text: "일간 인간과 권리: \"스털링 교수가 행사장에 도착했습니다. 교수의 제자들을 포함한 군중들이 환호로 교수를 맞이하고 있습니다. 스털링 교수가 SAM의 스승이 될까요?\""
    VisualName: " %1, 클리핑 12/20"
  News_13:
    Text: "투모로우 해럴드: \"관객들은 열광하고 있습니다. 위험을 바로바로 감지할 수 있는 SAM의 능력은 경제학에 필수입니다. 어떤 사람들은 SAM의 다른 버전을 업무용으로 구입하겠다는 의사도 나타내고 있습니다.\""
    VisualName: " %1, 클리핑 13/20"
  News_14:
    Text: "투모로우 해럴드: \"공식 행사 전에 이루어진 시설 내부 투어에서는 모든 기밀 사항을 공개하지 않고서는 SAM의 작동을 방해하는 것은 실질적으로 불가능함을 보여줬습니다.\""
    VisualName: " %1, 클리핑 14/20"
  News_15:
    Text: "투모로우 해럴드: \"SAM의 데이터베이스엔 경제학이나 정치학만 들어있는 것이 아닙니다. SAM은 행사에 참석한 모든 손님과 그 가족들에 대해서도 알고 있습니다. 심지어 통계 자료를 비교해 일부 손님들에게 자녀들이 갈 학교를 추천해주기도 했습니다.\""
    VisualName: " %1, 클리핑 15/20"
  News_16:
    Text: "투모로우 해럴드: \"모든 손님들은 일종의 선물로써 SAM에게 스캔을 받아 완전한 건강검진 결과를 드렸습니다. 결과가 만족스럽지만은 않은 분들도 있었습니다. 검진 결과에는 건강에 대한 조언도 함께 있었습니다.\""
    VisualName: " %1, 클리핑 16/20"
  News_2:
    Text: "프로메테우스 뉴스: \"학술 협회장은 SAM은 인류의 '사회적 차별이 없는 세상으로 나아가는 인류의 수줍은 첫 발이다' 라고 했습니다. SAM은 미래의 도래이자 예견된 신호입니다.\""
    VisualName: " %1, 클리핑 2/20"
  News_3:
    Text: "프로메테우스 뉴스: \"그러나 프로젝트 스폰서들의 관심은 미래가 아닌 오늘날에 머물러 있습니다. SAM이 오늘날의 인류에게 어떤 공헌을 할 것인가? 바로 이 문제를 가지고 열띤 토론을 벌이고 있습니다.\""
    VisualName: " %1, 클리핑 3/20"
  News_4:
    Text: "프로메테우스 뉴스: \"스털링 교수가 행사 막바지에 도착했습니다. 교수는 SAM은 여전히 인류의 신뢰를 얻어야 한다고 요약했으며 인류의 지식을 SAM에게 가르치는 일은 인류의 책임이라고 했습니다.\""
    VisualName: " %1, 클리핑 4/20"
  News_5:
    Text: "프로메테우스 뉴스: \"A.I.의 열성적인 지지자는 대통령을 초대해 임기 중 하야를 요구했습니다. '정부는 이제 불필요하다, A.I.가 같은 문제를 보다 효과적으로 해결할 것이다.'\""
    VisualName: " %1, 클리핑 5/20"
  News_6:
    Text: "프로메테우스 뉴스: \"공식적인 행사가 종료된 뒤 스털링 교수는 시설을 나가 시위대를 만났습니다. 경찰을 물린 교수는 \"최종 결정을 내리기 전에 저는 실제로 A.I. '내부'에서 1년의 시간을 보냈습니다.\""
    VisualName: " %1, 클리핑 6/20"
  News_7:
    Text: "\"이 A.I.는 세계 자원을 현명하게 재분배 해 기아와 질병 및 범죄를 예방할 것입니다. 그러나 '행복'은 주관적인 개념입니다.\" 라고 말했습니다."
    VisualName: " %1, 클리핑 7/20"
  News_8:
    Text: "\"스털링 교수는 새 기술에서 많은 영감을 받는다고 합니다. 그러나 마지막에 교수는 불가항력적인 시나리오를 배제해서는 안된다고 합니다. A.I.의 제작자들은 '플랜 B'가 없습니다. SAM이 악인들의 손에 들어가면 어떻게 될까요?\""
    VisualName: " %1, 클리핑 8/20"
  News_9:
    Text: "일간 인간과 권리: \"과학자와 경제인들을 초청해 '인공 지능 컴퓨터' 시설을 공개했습니다. 그러나 행사에 초청된 자유 미디어 대표는 없었습니다.\""
    VisualName: " %1, 클리핑 9/20"
  Shifts_1:
    Text: "시설이 엄청 크군요! 내부가 파라오의 피라미드 수준일 줄은 몰랐습니다. 이상한 점이 있는데 복도 대부분이 150-80센티 정도 되는 안보이는 벽으로 막혀 있군요."
    VisualName: " %1, 입구 1/8"
  Shifts_2:
    Text: "저녁마다 가끔 전압이 급격히 늘어나다니 이상하군요. 심각한 건 아니지만 신경이 쓰입니다. 테스트 스케줄도 없는 시간에 어떻게 그정도의 리소스가 사용되는 걸까요?"
    VisualName: " %1, 입구 2/8"
  Shifts_3:
    Text: "연구실에서 사람을 구해냈는데 심하게 화상을 입고 있었어요.. 그런데 삼십 분 정도 뒤에 다른 들것에 실려 나온 사람을 봤는데 아까 그사람인거에요! 게다가 화상도 없었죠. 좀 쉬어야겠습니다..."
    VisualName: " %1, 입구 3/8"
  Shifts_4:
    Text: "그렇게 복잡한 전선들은 태어나서 처음 봤어요! 시설 건축 인부들이 파워 노드 배치에는 신경을 안 쓴 모양입니다. 여기 저기 흩어져 있는 데다 순서도 일정하지 않아요!"
    VisualName: " %1, 입구 4/8"
  Shifts_5:
    Text: "지난 밤 근무 때 너무 불안했어요. 비명 소리가 들렸죠. 알아보려고 뛰쳐 나갔는데 내 동료가 환자복을 입은 사람을 연구실로 옮기고 있었서요. 잘리기 싫으면 조용히 하라는 얘기를 들었습니다..."
    VisualName: " %1, 입구 5/8"
  Shifts_6:
    Text: "시설이 계속 바뀌는 데 적응이 안됩니다. 지난 달에 받은 지도가 벌써 의미가 없어졌어요. 어떤 재수없는 수리공은 두 층 높이에서 떨어졌다구요!"
    VisualName: " %1, 입구 6/8"
  Shifts_7:
    Text: "이 시설의 인공지능은 정말 대단해요! 같이 체스를 두면 정말 재밌죠. 분명히 말하는 데 이 녀석 저한테 한 두번은 일부러 져줬다니까요! 당연히 체스로 인간한테 이기는 건 일도 아닐테니까요."
    VisualName: " %1, 입구 7/8"
  Shifts_8:
    Text: "연구실에 어떤 친구가 말하길 A.I.의 목소리는 임의로 고른 게 아니라더군요. 사람을 편안하게 하는 목소리를 찾아서 골랐다고 합니다. 그래서 A.I.랑 이야기하는게 그렇게 즐거웠군요!"
    VisualName: " %1, 입구 8/8"
  SwarmSpec_1:
    Text: "스웜은 본래 복잡한 외과수술용으로 디자인 되었지만 미래 의료기기의 프로토타입이 되었습니다."
    VisualName: " %1, 페이지 1/4"
  SwarmSpec_2:
    Text: "실제 상황에서 스웜은 의료 작업에는 적합하지 않을 뿐만 아니라 매우 위험했습니다. 심각한 의료사고로 인해 프로젝트가 중단되었죠."
    VisualName: " %1, 페이지 2/4"
  SwarmSpec_3:
    Text: "그러나 스웜은 용도 전환이 쉬웠습니다. 수 많은 수정을 통해 실패한 의료 기기를 신뢰할 수 있는 방어 시스템으로 변환했죠."
    VisualName: " %1, 페이지 3/4"
  SwarmSpec_4:
    Text: "스웜은 체온, 움직임, 맥박을 감지하고 반응합니다. 엄격한 생체 파라미터를 통해 원하는 목표물을 구분하고 사고로 인한 사살 가능성을 철저하게 배제합니다. 또한 특정 구역을 순찰하면 절대 떠나지 않습니다."
    VisualName: " %1, 페이지 4/4"
