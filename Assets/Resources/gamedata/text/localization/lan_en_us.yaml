Notes:
  CategoryNames:
    Cloning: "An ABC to Cloning"
    Diary: "Complex Builder's Diary"
    Fredricson: "Mr. Fredricson Visits the Complex"
    HumanNRobots: "Humans and Robots: An Ethical Review"
    News: "A. I. Gala Opening Press Dossier"
    Shifts: "My Night Shifts Log"
    SwarmSpec: "Specifications for the Swarm"
  Cloning_1:
    Text: "Cloning is an advanced technology that artificially re-creates an existing biological organism based on its gene code, or DNA, taken at any moment in its life or soon after its death."
    VisualName: " %1, section 1/8"
  Cloning_2:
    Text: "Clones do not need to be \"educated,\" thanks to genetic memory. The donor's DNA stores all the subject's habitual motoric sequences and nerve reactions."
    VisualName: " %1, section 2/8"
  Cloning_3:
    Text: "Using post-mortem DNA samples for cloning allows us to take advantage of as much of the donor's life experience as possible, including the moment of death itself and its reasons. It is thus preferred to wait until right after death to collect."
    VisualName: " %1, section 3/8"
  Cloning_4:
    Text: "It's impossible to tell a clone from its \"original,\" that is, the human whose DNA was used to create the clone. The clone itself will likely identify as that particular human unless it's told the truth."
    VisualName: " %1, section 4/8"
  Cloning_5:
    Text: "Absolute histocompatibility makes cloning the ideal technology for transplantology. One can have whole sets of \"spare\" organs and limbs to replace those of his or her own when necessary."
    VisualName: " %1, section 5/8"
  Cloning_6:
    Text: "A clone does not have, or need, \"childhood.\" It emerges from the tank as a mature organism. Creating juvenile clones (e. g., for pediatric transplantology or other purposes) is still under theoretical development."
    VisualName: " %1, section 6/8"
  Cloning_7:
    Text: "Only mass production will make individual clones cheap enough to be used for manual labor or military service. \"Clone slavery\" remains an ethical issue for society, not science, to solve."
    VisualName: " %1, section 7/8"
  Cloning_8:
    Text: "The nature of a clone is dual. While objectively it is no more than a biologically accurate copy of a human, subjectively it feels and behaves AS IF it was a natural human being."
    VisualName: " %1, section 8/8"
  Diary_1:
    Text: "Community services, they said. Will help to reduce your prison term, they said. Of course, you get to kick the bucket sooner workin' here. Though... did we really have any choice?"
    VisualName: " %1, entry 1/8"
  Diary_2:
    Text: "Some say it's the gov't who forked out the dough to build all this. It's weapons they want, not progress. I bet they'll just 'dispose of' us witnesses once the work's done."
    VisualName: " %1, entry 2/8"
  Diary_3:
    Text: "Some lab coats came to check on our work today. They kept sayin', \"You're doing a great service to mankind.\" Guess this place is gonna be some scientific center. Sweet talkin' us to keep us in line, is what I think."
    VisualName: " %1, entry 3/8"
  Diary_4:
    Text: "The ground's bad here. Whose brilliant idea was it to build here? Bet the guy never went underground before sending us in. Now I get why they wanted inmates working here. We're disposable. Ten die, and they can bring fifty more."
    VisualName: " %1, entry 4/8"
  Diary_5:
    Text: "Buddies say it's time to get out of here while we still can. Can't argue that. Stan's got a plan to escape this hellhole that involves a secret room and a 'weapon'. Can't wait!"
    VisualName: " %1, entry 5/8"
  Diary_6:
    Text: "Stan's plan was goddamn dynamite! The weight bearing structures gave way! The seals are closing, but we're still here! Stan's a lucky idiot - killed by a falling girder - else I'd strangle him myself for this mess!"
    VisualName: " %1, entry 6/8"
  Diary_7:
    Text: "We were 27 an hour ago, now we're only 18. There won't be enough air for everyone. Gotta make a decision. Stan never said where his secret room was. Guess I'll have to find it. Maybe there's a way out there, too?"
    VisualName: " %1, entry 7/8"
  Diary_8:
    Text: "Haven't I seen this computer thingy before? Am I walkin' in circles? Damn, I've lost my way! Stan, what did you get me into? I gotta find that room at all costs. I don't wanna die here..."
    VisualName: " %1, entry 8/8"
  Fredricson_1:
    Text: "Dear Mr. Fredricson, As a leader of opinion greatly involved in the public discussion on this issue, we hope to make you a new friend for our cause. With best regards, - the A.I. team."
    VisualName: " %1, document 1/8"
  Fredricson_2:
    Text: "You are hereby invited to participate in the grand rally and inauguration of the artificial intelligence taking place next week. "
    VisualName: " %1, document 2/8"
  Fredricson_3:
    Text: "Please do not leave the designated guest area without a trained guide. We have no secrets, but you risk being lost in the immense corridors of the complex."
    VisualName: " %1, document 3/8"
  Fredricson_4:
    Text: "Have you lost something? Please reclaim all items misplaced during the conference and the subsequent banquet at our lost-and-found office."
    VisualName: " %1, document 4/8"
  Fredricson_5:
    Text: "Crime & Accidents: \"Elderly man disappears after the A.I. inauguration gala. Police and complex security guards join search-and-rescue operation.\""
    VisualName: " %1, document 5/8"
  Fredricson_6:
    Text: "Crime & Accidents: \"'We warned all guests,' A.I. team says. 'Wandering in the complex without a guide might be dangerous.' They promise to put forth full efforts to find the missing man.\""
    VisualName: " %1, document 6/8"
  Fredricson_7:
    Text: "Crime & Accidents: \"Dead man found in the A.I. complex is identified as Mr. J. Fredricson. He died of dehydration after five days lost in the massive complex.\""
    VisualName: " %1, document 7/8"
  Fredricson_8:
    Text: "Crime & Accidents: \"A.I. spokesman refuses rumors that the deceased faced untold dangers before his death. 'Most of the complex is only empty corridors filled with hardware,' he says, 'but we plan to improve security.\""
    VisualName: " %1, document 8/8"
  HumanNRobots_1:
    Text: "What makes a person? Is it self-awareness combined with one's uniqueness in the world?"
    VisualName: " %1, chapter 1/8"
  HumanNRobots_2:
    Text: "Twins, even genetically identical ones, are definitely two different people because of their unique life experiences. But will the same be true for subjects (two or more) who also share the same experiences?"
    VisualName: " %1, chapter 2/8"
  HumanNRobots_3:
    Text: "The major difference between humans and computers is that humans have free will."
    VisualName: " %1, chapter 3/8"
  HumanNRobots_4:
    Text: "Unlike artificial intellects, humans can make truly irrational choices, which is paradoxically both their weakness and their strength."
    VisualName: " %1, chapter 4/8"
  HumanNRobots_5:
    Text: "Computer systems are able to evolve, but it seems that only people (including artificial ones) can truly suffer."
    VisualName: " %1, chapter 5/8"
  HumanNRobots_6:
    Text: "If human conscience is nothing but an interconnection of the many nerve cells in the brain, it might be possible to relocate a human person into artificial hardware, replacing neurons with microcircuits."
    VisualName: " %1, chapter 6/8"
  HumanNRobots_7:
    Text: "Claims exist that evolution is impossible without suffering (though not necessarily physical). Learning by experience, for example, is impossible without suffering through mistakes."
    VisualName: " %1, chapter 7/8"
  HumanNRobots_8:
    Text: "Question: Is the promise of evolution for some at the cost of suffering for all ethically justified?
    "
    VisualName: " %1, chapter 8/8"
  News_1:
    Text: "The Prometheus News: \"The cleverly designed interiors make every guest of the inauguration gala feel like they're in the world of the future. A storm of applause welcomed SAM's first words.\""
    VisualName: " %1, clipping 1/20"
  News_10:
    Text: "Man and His Right Daily: \"Protesters gather near the complex, demanding the prohibition of artificial intelligence. People worry man will lose control of the computer. We'll keep you abreast of the current situation.\""
    VisualName: " %1, clipping 10/20"
  News_11:
    Text: "Man and His Right Daily: \"As you may know, SAM (the super computer's name. - ed.) is a self-learning system. 'It's like a child to whom someone can set a bad example,' a protester says."
    VisualName: " %1, clipping 11/20"
  News_12:
    Text: "Man and His Right Daily: \"Professor Sterling arrives at the gala. The crowd, which includes many of Sterling's students, is yelling to greet him. Will Sterling become SAM's teacher?\""
    VisualName: " %1, clipping 12/20"
  News_13:
    Text: "Tomorrow's Herald: \"The guests are enthusiastic. SAM's ability to determine risks on the fly makes her an indispensable tool for economics. Some talk of buying a modified version of SAM to use in their buisnesses.\""
    VisualName: " %1, clipping 13/20"
  News_14:
    Text: "Tomorrow's Herald: \"A guided tour through the complex before the official event started shows that, without disclosing all the secrets, interference in the operations of SAM is practically impossible.\""
    VisualName: " %1, clipping 14/20"
  News_15:
    Text: "Tomorrow's Herald: \"SAM's database contains more than economics and politics. She knew every guest at the gala and their family members. She even helped some to choose schools for their children by consulting the statistics.\""
    VisualName: " %1, clipping 15/20"
  News_16:
    Text: "Tomorrow's Herald: \"As a gift, every guest was scanned by SAM and received a complete medical report. Some were less than happy with the results. The reports were accompanied with health advice.\""
    VisualName: " %1, clipping 16/20"
  News_2:
    Text: "The Prometheus News: \"The head of the academic council said that SAM is mankind's 'first bashful step into the world without social discrimination'. She is both the herald of the future and its predictive sign.\""
    VisualName: " %1, clipping 2/20"
  News_3:
    Text: "The Prometheus News: \"But the interests of the project's sponsors belong to the present day, not the future. How will SAM be useful for mankind today? This issue is being discussed heatedly.\""
    VisualName: " %1, clipping 3/20"
  News_4:
    Text: "The Prometheus News: \"Professor Sterling arrived when the event was almost finished. He summarized that SAM still has to earn mankind's trust. And it is up to a human to teach it everything they know.\""
    VisualName: " %1, clipping 4/20"
  News_5:
    Text: "The Prometheus News: \"An enthusiastic supporter of the A.I. invited the President to resign mid-term: 'Governments are no longer needed; the A.I. will solve the same issues more efficiently.'\""
    VisualName: " %1, clipping 5/20"
  News_6:
    Text: "The Prometheus News: \"After the gala was officially over, Prof. Sterling walked out of the complex to meet the protesters. He asked the police to retreat. \"I'll spend a year 'inside' the A.I. to make my final judgement about it.\""
    VisualName: " %1, clipping 6/20"
  News_7:
    Text: "\"The A.I. will be able to redistribute world resources wisely to prevent hunger and disease and to reduce crime. 'Happiness,' howerver, is a subjective notion,\" says Prof. Sterling."
    VisualName: " %1, clipping 7/20"
  News_8:
    Text: "\"Prof. Sterling feels inspired by the new technology. But in the end he says a force majeure scenario can't be ruled out. The creators of the A.I. lack a 'Plan B.' What if SAM falls into the wrong hands?\""
    VisualName: " %1, clipping 8/20"
  News_9:
    Text: "Man and His Right Daily: \"Leading scientists and businessmen meet to inaugurate the complex housing the 'intellectual computer.' Representatives of the free media invited to the gala: none.\""
    VisualName: " %1, clipping 9/20"
  Shifts_1:
    Text: "The complex is huge! I didn't expect it to look so much like a pharaoh's tomb inside. Strangely, many corridors here are cut across by blind walls some six or seven feet tall..."
    VisualName: " %1, entry 1/8"
  Shifts_2:
    Text: "It's odd how voltage swings happen on some evenings. It's nothing serious, but it makes me nervous. How can such a high amount of resources be used during the hour marked with a dash in the tests schedule?"
    VisualName: " %1, entry 2/8"
  Shifts_3:
    Text: "They rolled a man out of the lab, badly burnt. But... half an hour later I saw another stretcher, and I could swear the man on it was the same I saw before, but there were no burns! I need a day off..."
    VisualName: " %1, entry 3/8"
  Shifts_4:
    Text: "I've never seen such a crazy tangle of wires in my life! The builders of the complex seem to have paid little attention to positioning the power nodes. They’re all over the place and in no particular order!"
    VisualName: " %1, entry 4/8"
  Shifts_5:
    Text: "Had an unnerving shift last night. There were screams. When I came running to investigate, I saw my colleagues pulling a guy in a hospital robe toward the lab. I was told to keep quiet if I want to keep this job..."
    VisualName: " %1, entry 5/8"
  Shifts_6:
    Text: "Can't get used to the complex changing all the time. Last month's maps are already outdated. I've heard of some unlucky repairmen who fell as many as two floors down!"
    VisualName: " %1, entry 6/8"
  Shifts_7:
    Text: "The complex's artificial intelligence is awesome! Playing chess with her is a pleasure. I bet the damned thing has yielded to me intentionally once or twice! Of course, defeating a human is not a problem for her."
    VisualName: " %1, entry 7/8"
  Shifts_8:
    Text: "Some guys from the lab told me that the A.I.'s voice was not picked at random. They have been looking for a voice that could fill men with peace of mind. That's why it is so nice to chat with her!"
    VisualName: " %1, entry 8/8"
  SwarmSpec_1:
    Text: "Originally designed for complicated surgeries, the Swarm was the prototype for medical equipment of the future."
    VisualName: " %1, page 1/4"
  SwarmSpec_2:
    Text: "In practice, the Swarm was found to be unstable for medical tasks and extremely dangerous. A fatal incident forced its creators to discontinue the project."
    VisualName: " %1, page 2/4"
  SwarmSpec_3:
    Text: "However, the Swarm turned out to be quite flexible. A number of modifications helped to convert the failed medical tool into a reliable guardian system."
    VisualName: " %1, page 3/4"
  SwarmSpec_4:
    Text: "The Swarm responds to body heat, movement, and pulse. Strict biological parameters defining the intended target exclude any possibility of accidental killing. It patrols a certain area and never leaves it."
    VisualName: " %1, page 4/4"
